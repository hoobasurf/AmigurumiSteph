<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messagerie</title>

<style>
body {
  margin:0;
  font-family:'Comic Sans MS',cursive;
  background:#ffe6f0;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* ===== SIDEBAR ===== */
#sidebar{
  position:fixed;
  top:0;
  left:-220px;
  width:220px;
  height:100vh;
  background:rgba(255,230,240,0.9);
  border-right:2px solid #b67385;
  padding:20px;
  transition:left .3s;
  z-index:1000;
}

#sidebar.sidebar-open{
  left:0;
}

#toggleSidebar{
  position:absolute;
  top:50%;
  right:-30px;
  width:30px;
  height:60px;
  background:#ffb6c1;
  border-radius:0 12px 12px 0;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:bold;
  color:white;
}

#backBtn{
  width:auto;
  padding:8px 16px;
  border-radius:16px;
  border:none;
  background:#ffb6c1;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
  margin-top:10px;
}

/* ===== CHAT ===== */
#chat-container {
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* Bulles messages */
.message {
  max-width:70%;
  padding:8px 12px;
  border-radius:16px;
  font-size:14px;
  word-wrap:break-word;
  display:inline-block;
}

.message.you {
  align-self:flex-end;
  background:#ffb6c1;
  color:white;
  border-bottom-right-radius:4px;
}

.message.other {
  align-self:flex-start;
  background:rgba(255,182,193,0.3);
  color:#b84c6f;
  border-bottom-left-radius:4px;
}

/* Barre en bas */
#input-bar {
  display:flex;
  gap:6px;
  padding:10px;
  border-top:2px solid #b67385;
  background:#fff0f5;
  align-items:center;
}

#input-bar input {
  flex:1;
  padding:8px 12px;
  border-radius:16px;
  border:2px solid #b67385;
  outline:none;
}

#input-bar button {
  padding:8px 16px;
  border:none;
  border-radius:16px;
  background:#ffb6c1;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

  #photo-btn {
  width:38px;
  height:38px;
  padding:0;
  border-radius:50% !important;
  flex-shrink:0;
  font-size:18px;
  line-height:1;
}

  
</style>

</head>

<body>

<!-- ===== SIDEBAR ===== -->

<div id="sidebar">
  <div id="toggleSidebar">☰</div>
  <button id="backBtn">Retour</button>
</div>

<!-- ===== CHAT ===== -->

<div id="chat-container"></div>

<div id="input-bar">

  <div style="position:relative;">
    <button id="media-btn" style="width:44px;height:44px;border:none;background:none;cursor:pointer;padding:0;flex-shrink:0;">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff8fab,#ffb6c1,#ffc8dd);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(255,100,150,0.35);transition:transform .15s;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="5" width="13" height="10" rx="2" fill="white" opacity="0.9"/>
          <circle cx="6.5" cy="8" r="1.2" fill="#ffb6c1"/>
          <polyline points="3,13 7,9 10,12 13,8.5 16,13" fill="none" stroke="#ffb6c1" stroke-width="1.2" stroke-linejoin="round"/>
          <circle cx="18" cy="17" r="4.5" fill="#ff8fab"/>
          <line x1="18" y1="14.5" x2="18" y2="19.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="15.5" y1="17" x2="20.5" y2="17" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </button>

    <div id="media-menu" style="display:none;position:absolute;bottom:58px;left:0;background:#fff0f5;border:2px solid #ffb6c1;border-radius:16px;padding:8px 6px;box-shadow:0 4px 18px rgba(255,100,150,0.2);z-index:500;flex-direction:column;gap:4px;min-width:150px;">
      <button id="opt-photo" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;cursor:pointer;font-family:'Comic Sans MS',cursive;font-size:13px;color:#b84c6f;border:none;background:transparent;width:100%;">📷 Photo</button>
      <button id="opt-video" style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;cursor:pointer;font-family:'Comic Sans MS',cursive;font-size:13px;color:#b84c6f;border:none;background:transparent;width:100%;">🎬 Vidéo</button>
      <button id="opt-file"  style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;cursor:pointer;font-family:'Comic Sans MS',cursive;font-size:13px;color:#b84c6f;border:none;background:transparent;width:100%;">📎 Fichier</button>
    </div>
  </div>

  <!-- ===== NOUVEAU BOUTON ENVOYER PHOTO ===== -->
  <button id="quick-photo-btn" style="width:44px;height:44px;border:none;background:none;cursor:pointer;padding:0;flex-shrink:0;">
    <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#c9a0dc,#e0b8f5,#f3d6ff);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(180,100,255,0.35);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="6" width="20" height="14" rx="3" fill="white" opacity="0.9"/>
        <circle cx="12" cy="13" r="4" fill="none" stroke="#c9a0dc" stroke-width="1.8"/>
        <circle cx="12" cy="13" r="1.8" fill="#c9a0dc"/>
        <rect x="8" y="4" width="8" height="3" rx="1.5" fill="white" opacity="0.9"/>
        <circle cx="18.5" cy="8.5" r="1" fill="#c9a0dc"/>
        <!-- flèche vers le haut = envoyer -->
        <circle cx="19" cy="19" r="4.5" fill="#c9a0dc"/>
        <polyline points="19,21.5 19,16.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="16.8,18.3 19,16.5 21.2,18.3" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </button>
  <!-- ===== FIN NOUVEAU BOUTON ===== -->

  <input id="message-input" placeholder="Écrire un message...">
  <button id="send-btn">Envoyer</button>
</div>

<input type="file" id="file-input-photo" accept="image/*" style="display:none">
<input type="file" id="file-input-video" accept="video/*" style="display:none">
<input type="file" id="file-input-file" style="display:none">
<input type="file" id="file-input-quick-photo" accept="image/*" style="display:none">

<script src="image-handler.js"></script>

<script type="module">

/* ===== CHAT ===== */
const chatContainer = document.getElementById('chat-container');
const input = document.getElementById('message-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(text, sender="you") {
  const msg = document.createElement('div');
  msg.className = `message ${sender}`;
  msg.textContent = text;
  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

sendBtn.onclick = () => {
  const text = input.value.trim();
  if(!text) return;
  addMessage(text, "you");
  input.value = "";

  setTimeout(() => {
    addMessage("Réponse automatique", "other");
  }, 500);
};

input.addEventListener('keypress', e => {
  if(e.key === 'Enter') sendBtn.onclick();
});

/* ===== SIDEBAR ===== */
document.getElementById('toggleSidebar').onclick = () => {
  document.getElementById('sidebar').classList.toggle('sidebar-open');
};

// Bouton retour avec fondu (IDENTIQUE code 1)
document.getElementById('backBtn').onclick = () => {
  document.body.style.transition = 'opacity 0.5s';
  document.body.style.opacity = '0';
  setTimeout(() => {
    window.location.href = 'owner.html';
  }, 500);
};

/* ===== MEDIA BUTTON ===== */
const mediaMenu = document.getElementById('media-menu');

document.getElementById('media-btn').onclick = (e) => {
  e.stopPropagation();
  mediaMenu.style.display = mediaMenu.style.display === 'flex' ? 'none' : 'flex';
};
document.addEventListener('click', () => mediaMenu.style.display = 'none');
mediaMenu.addEventListener('click', e => e.stopPropagation());

document.getElementById('opt-photo').onclick = () => { mediaMenu.style.display='none'; document.getElementById('file-input-photo').click(); };
document.getElementById('opt-video').onclick = () => { mediaMenu.style.display='none'; document.getElementById('file-input-video').click(); };
document.getElementById('opt-file').onclick  = () => { mediaMenu.style.display='none'; document.getElementById('file-input-file').click(); };

document.getElementById('file-input-photo').onchange = (e) => {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const msg = document.createElement('div'); msg.className='message you';
  msg.innerHTML=`<img src="${url}" style="max-width:200px;max-height:200px;border-radius:10px;display:block;">`;
  chatContainer.appendChild(msg); chatContainer.scrollTop=chatContainer.scrollHeight;
  e.target.value="";
};

document.getElementById('file-input-video').onchange = (e) => {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const msg = document.createElement('div'); msg.className='message you';
  msg.innerHTML=`<video src="${url}" controls style="max-width:220px;border-radius:10px;display:block;"></video>`;
  chatContainer.appendChild(msg); chatContainer.scrollTop=chatContainer.scrollHeight;
  e.target.value="";
};

document.getElementById('file-input-file').onchange = (e) => {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const size = (file.size/1024).toFixed(1);
  const msg = document.createElement('div'); msg.className='message you';
  msg.innerHTML=`<div style="display:flex;align-items:center;gap:8px;font-size:13px;">📎 <div><div style="font-weight:bold">${file.name}</div><div style="opacity:.7">${size} Ko</div></div> <a href="${url}" download="${file.name}" style="color:#ff8fab;">⬇</a></div>`;
  chatContainer.appendChild(msg); chatContainer.scrollTop=chatContainer.scrollHeight;
  e.target.value="";
};

/* ===== NOUVEAU BOUTON QUICK PHOTO ===== */
document.getElementById('quick-photo-btn').onclick = () => {
  document.getElementById('file-input-quick-photo').click();
};

document.getElementById('file-input-quick-photo').onchange = (e) => {
  const file = e.target.files[0]; if(!file) return;
  const url = URL.createObjectURL(file);
  const msg = document.createElement('div'); msg.className='message you';
  msg.innerHTML=`<img src="${url}" style="max-width:200px;max-height:200px;border-radius:10px;display:block;">`;
  chatContainer.appendChild(msg); chatContainer.scrollTop=chatContainer.scrollHeight;
  e.target.value="";
};
/* ===== FIN NOUVEAU BOUTON ===== */

</script>

</body>
</html>
