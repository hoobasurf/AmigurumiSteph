#sidebar {
position:fixed; top:0; left:-220px;

#sidebar.open { left:0; pointer-events:auto; }

#toggleSidebar {

background:#ffb6c1;
border-radius:0 12px 12px 0;

.clickable-btn {
position:fixed;
background:transparent; border:none;
cursor:pointer; z-index:500;
touch-action:manipulation;

.overlay {
position:fixed; inset:0;

.drawer-modal {

.modal-content { display:flex; flex-direction:column; gap:12px; }

.counter-section {

padding:15px; border-radius:12px; text-align:center;
}
.counter-label { color:#ff69b4; font-size:14px; font-weight:bold; margin-bottom:10px; }
.counter-controls { display:flex; justify-content:center; align-items:center; gap:12px; }
.counter-btn {
background:#ffb6c1; border:none; color:white;
width:44px; height:44px; border-radius:50%;
font-size:22px; font-weight:bold; cursor:pointer;
touch-action:manipulation;
}
.counter-btn:hover { background:#ff69b4; }
.counter-value {
background:white; color:#ff69b4;
padding:6px 20px; border-radius:20px;
font-size:24px; font-weight:bold; min-width:60px; text-align:center;
}

.photo-section { display:flex; flex-direction:column; gap:8px; }
.photo-preview {
width:100%; height:150px;
display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.photo-preview img { width:100%; height:100%; object-fit:contain; }
.photo-preview-empty {
color:#ffb6c1; font-size:13px; text-align:center;
background:#fff0f5; border:2px dashed #ffb6c1; border-radius:12px;
width:100%; height:100%;
display:flex; align-items:center; justify-content:center;

.photo-btn {
padding:7px 14px; background:#ffb6c1; border:none;
border-radius:8px; color:white; cursor:pointer; font-size:11px; font-weight:bold;
font-family:‘Comic Sans MS’,cursive;
touch-action:manipulation;
}
.photo-btn:hover { background:#ff69b4; }

.notes-section { display:flex; flex-direction:column; gap:6px; }
.notes-section label { color:#b67385; font-weight:bold; font-size:13px; }
.notes-section textarea {
width:100%; min-height:80px; padding:10px;
border:2px solid #ffb6c1; border-radius:12px;
background:#fff0f5; color:#b84c6f;
font-family:‘Comic Sans MS’,cursive; font-size:13px; resize:vertical;
}

.modal-buttons { display:flex; gap:8px; margin-top:8px; }
.modal-buttons button {
flex:1; padding:10px; border:none; border-radius:10px;
font-weight:bold; cursor:pointer; font-size:13px;
font-family:‘Comic Sans MS’,cursive;
touch-action:manipulation;
}
.save-btn { background:#ffb6c1; color:white; }
.save-btn:hover { background:#ff69b4; }
.close-btn { background:#ddd; color:#666; }

.drawers-grid-modal {
position:fixed; top:50%; left:50%;
transform:translate(-50%,-50%);
background:linear-gradient(145deg,#ffe6f0,#ffd6e8);
padding:30px; border-radius:20px;
z-index:10000; width:90%; max-width:800px;
max-height:85vh; overflow-y:auto;

.drawers-grid {

.drawer-card {

border-radius:12px; display:none;
}

<script>
var IMGBB_KEY = '1612fdd94e39f24c3d14f1864f41d591';
var SB_URL    = 'https://kdgxbmqwhpuctjtlygrt.supabase.co';

var SB_HEADS  = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
var SB_HEADS_GET = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

var NAMES = ['','Blanc','Ecru/Ivoire','Beige','Marron','Gris','Noir','Jaune','Orange','Rouge','Rose','Violet','Bleu','Vert','Turquoise','Multicolore','Metal/Argent'];
var drawersData = {};

// ===== IMGBB UPLOAD =====
async function uploadPhoto(file) {
  var compressed = await compressImg(file);
  var fd = new FormData();
  fd.append('image', compressed);
  for (var attempt = 0; attempt < 3; attempt++) {
    try {
      var res = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_KEY, { method: 'POST', body: fd });
      var json = await res.json();
      if (json.success) return json.data.url;
    } catch(e) {
      await new Promise(function(r) { setTimeout(r, 1500); });
    }
  }
  throw new Error('Upload ImgBB echoue');
}

function compressImg(file) {
  return new Promise(function(resolve) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var w = img.width, h = img.height, max = 1200;
        if (w > h && w > max) { h = h * max / w; w = max; }
        else if (h > max) { w = w * max / h; h = max; }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(function(blob) {
          resolve(new File([blob], 'photo.jpg', { type: 'image/jpeg' }));
        }, 'image/jpeg', 0.75);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ===== SUPABASE =====
async function sbLoad() {
  try {
    var res = await fetch(SB_URL + '/rest/v1/drawers?select=*', { headers: SB_HEADS_GET });
    var data = await res.json();
    if (Array.isArray(data)) {
      data.forEach(function(row) {
        if (drawersData[row.drawer_number]) {
          drawersData[row.drawer_number].photo = row.photo_url || null;
          drawersData[row.drawer_number].notes = row.notes    || '';
          drawersData[row.drawer_number].count = row.count    || 0;
        }
      });
    }
  } catch(e) { console.error('sbLoad:', e); }
}

async function sbSave(num) {
  var d = drawersData[num];
  try {
    var check = await fetch(SB_URL + '/rest/v1/drawers?drawer_number=eq.' + num + '&select=id', { headers: SB_HEADS_GET });
    var rows = await check.json();
    if (rows && rows.length > 0) {
      await fetch(SB_URL + '/rest/v1/drawers?drawer_number=eq.' + num, {
        method: 'PATCH',
        headers: SB_HEADS,
        body: JSON.stringify({ photo_url: d.photo, notes: d.notes, count: d.count })
      });
    } else {
      await fetch(SB_URL + '/rest/v1/drawers', {
        method: 'POST',
        headers: Object.assign({}, SB_HEADS, { 'Prefer': 'return=minimal' }),
        body: JSON.stringify({ drawer_number: num, name: d.name, photo_url: d.photo, notes: d.notes, count: d.count })
      });
    }
  } catch(e) { console.error('sbSave:', e); }
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {

  toggleEl.addEventListener('click', function() {
    var open = sidebarEl.classList.contains('open');
    if (open) {
      sidebarEl.classList.remove('open');
      toggleEl.classList.remove('open');
    } else {
      sidebarEl.classList.add('open');
      toggleEl.classList.add('open');
    }
  });

  // Fermer sidebar si clic dehors
  document.addEventListener('click', function(e) {
    if (sidebarEl.classList.contains('open') && !sidebarEl.contains(e.target) && e.target !== toggleEl) {
      sidebarEl.classList.remove('open');
      toggleEl.classList.remove('open');
    }
  });

  document.getElementById('backBtn').onclick = function() { window.location.href = 'owner.html'; };
  document.getElementById('viewAllBtn').onclick = function() {

  document.querySelectorAll('.drawer-btn').forEach(function(btn) {

    });
  });

});

// ===== SHOW ALL =====
function showAllDrawers() {
var overlay = document.createElement(‘div’);
overlay.className = ‘overlay’;
var modal = document.createElement(‘div’);
modal.className = ‘drawers-grid-modal’;

var html = ‘<h2>\uD83D\uDCE6 Tous les tiroirs</h2><div class="drawers-grid">’;
for (var j = 1; j <= 16; j++) {
var dd = drawersData[j];
var preview = dd.photo ? ‘<img src="' + dd.photo + '">’ : ‘\uD83D\uDCF7’;
html +=
‘<div class="drawer-card" data-drawer="' + j + '" data-name="' + dd.name + '">’ +
’<div class="drawer-card-num">Tiroir ’ + j + ‘</div>’ +
‘<div class="drawer-card-name">’ + dd.name + ‘</div>’ +
‘<div class="drawer-card-count">\uD83E\uDDF6 ’ + (dd.count || 0) + ’ pelote(s)</div>’ +
‘<div class="drawer-card-preview">’ + preview + ‘</div>’ +
‘</div>’;
}
html += ‘</div><div class="modal-buttons"><button class="close-btn" id="cls-all">Fermer</button></div>’;
modal.innerHTML = html;

document.body.appendChild(overlay);
document.body.appendChild(modal);

modal.querySelectorAll(’.drawer-card’).forEach(function(card) {
card.addEventListener(‘click’, function() {
modal.remove(); overlay.remove();
openDrawer(parseInt(card.dataset.drawer), card.dataset.name);
});
});

function closeAll() { modal.remove(); overlay.remove(); }
document.getElementById(‘cls-all’).onclick = closeAll;
overlay.onclick = function(e) { if (e.target === overlay) closeAll(); };
}
