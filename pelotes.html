<title>Tiroirs Hobbii</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Comic Sans MS',cursive; overflow:hidden; }

#sidebar {
position:fixed; top:0; left:-220px;
width:220px; height:100vh;
background:rgba(255,230,240,0.97);
border-right:2px solid #b67385;
padding:60px 20px 20px;
transition:left .3s;
z-index:9000;
pointer-events:none;
}
#sidebar.open { left:0; pointer-events:auto; }

#toggleSidebar {
position:fixed; top:50%; left:0;
transform:translateY(-50%);
width:30px; height:60px;
background:#ffb6c1;
border-radius:0 12px 12px 0;
display:flex; align-items:center; justify-content:center;
cursor:pointer; font-weight:bold;
z-index:9002;
border:none; color:white; font-size:18px;
transition:left .3s;
}
#toggleSidebar.open { left:220px; }

#sidebar button {
display:flex; align-items:center; justify-content:center; gap:8px;
width:100%; padding:10px 16px; margin-top:12px;
border:none; border-radius:16px;
background:#ffb6c1; color:#fff;
font-weight:bold; font-size:14px; cursor:pointer;
font-family:‘Comic Sans MS’,cursive;
}
#sidebar button:hover { background:#ff69b4; }

.clickable-btn {
position:fixed;
background:transparent; border:none;
cursor:pointer; z-index:500;
}

.overlay {
position:fixed; inset:0;
background:rgba(0,0,0,0.7);
z-index:9999;
}

.drawer-modal {
position:fixed; top:50%; left:50%;
transform:translate(-50%,-50%);
background:linear-gradient(145deg,#ffe6f0,#ffd6e8);
padding:25px; border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
z-index:10000;
min-width:300px; max-width:90vw;
max-height:90vh; overflow-y:auto;
border:3px solid #ffb6c1;
}
.drawer-modal h2 { color:#ff69b4; margin-bottom:15px; text-align:center; font-size:20px; }
.modal-content { display:flex; flex-direction:column; gap:12px; }

.counter-section {
background:rgba(255,182,193,0.3); border:2px solid #ffb6c1;
padding:15px; border-radius:12px; text-align:center;
}
.counter-label { color:#ff69b4; font-size:14px; font-weight:bold; margin-bottom:10px; }
.counter-controls { display:flex; justify-content:center; align-items:center; gap:12px; }
.counter-btn {
background:#ffb6c1; border:none; color:white;
width:44px; height:44px; border-radius:50%;
font-size:22px; font-weight:bold; cursor:pointer;
}
.counter-btn:hover { background:#ff69b4; }
.counter-value {
background:white; color:#ff69b4;
padding:6px 20px; border-radius:20px;
font-size:24px; font-weight:bold; min-width:60px; text-align:center;
}

.photo-section { display:flex; flex-direction:column; gap:8px; }
.photo-preview {
width:100%; height:150px;
display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.photo-preview img { width:100%; height:100%; object-fit:contain; }
.photo-preview-empty {
color:#ffb6c1; font-size:13px; text-align:center;
background:#fff0f5; border:2px dashed #ffb6c1; border-radius:12px;
width:100%; height:100%;
display:flex; align-items:center; justify-content:center;
}
.photo-btn {
padding:7px 14px; background:#ffb6c1; border:none;
border-radius:8px; color:white; cursor:pointer; font-size:11px; font-weight:bold;
font-family:‘Comic Sans MS’,cursive;
}

.notes-section { display:flex; flex-direction:column; gap:6px; }
.notes-section label { color:#b67385; font-weight:bold; font-size:13px; }
.notes-section textarea {
width:100%; min-height:80px; padding:10px;
border:2px solid #ffb6c1; border-radius:12px;
background:#fff0f5; color:#b84c6f;
font-family:‘Comic Sans MS’,cursive; font-size:13px; resize:vertical;
}

.modal-buttons { display:flex; gap:8px; margin-top:8px; }
.modal-buttons button {
flex:1; padding:10px; border:none; border-radius:10px;
font-weight:bold; cursor:pointer; font-size:13px;
font-family:‘Comic Sans MS’,cursive;
}
.save-btn { background:#ffb6c1; color:white; }
.close-btn { background:#ddd; color:#666; }

.drawers-grid-modal {
position:fixed; top:50%; left:50%;
transform:translate(-50%,-50%);
background:linear-gradient(145deg,#ffe6f0,#ffd6e8);
padding:30px; border-radius:20px;
z-index:10000; width:90%; max-width:800px;
max-height:85vh; overflow-y:auto;
border:3px solid #ffb6c1;
}
.drawers-grid-modal h2 { color:#ff69b4; margin-bottom:20px; text-align:center; font-size:24px; }
.drawers-grid {
display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px; margin-bottom:20px;
}
.drawer-card {
background:white; border:2px solid #ffb6c1; border-radius:12px;
padding:15px; cursor:pointer; transition:all 0.2s;
}
.drawer-card:hover { transform:translateY(-3px); border-color:#ff69b4; }
.drawer-card-num { font-size:18px; font-weight:bold; color:#ff69b4; margin-bottom:5px; }
.drawer-card-name { font-size:14px; color:#b67385; }
.drawer-card-count { font-size:13px; color:#ff69b4; font-weight:bold; margin-top:5px; }
.drawer-card-preview {
margin-top:10px; width:100%; height:80px;
display:flex; align-items:center; justify-content:center;
font-size:20px; color:#ffb6c1; overflow:hidden;
}
.drawer-card-preview img { width:100%; height:100%; object-fit:contain; }

input[type=“file”] { display:none; }

#loading {
position:fixed; top:50%; left:50%;
transform:translate(-50%,-50%);
color:white; font-size:18px; z-index:10001;
background:rgba(0,0,0,0.8); padding:20px 40px;
border-radius:12px; display:none;
}
</style>

<script>
window.onerror = function(msg, src, line) { alert("ERREUR: " + msg + " ligne " + line); };
var SB_URL  = 'https://kdgxbmqwhpuctjtlygrt.supabase.co';
var SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZ3hibXF3aHB1Y3RqdGx5Z3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjY0NzQsImV4cCI6MjA5MDgwMjQ3NH0.9RsIj_bQgJskg9raRGN6uQJwUUlByTvWAFF2Eq9f6KM';
var IMGBB   = '1612fdd94e39f24c3d14f1864f41d591';

var NAMES = ['','Blanc','Ecru/Ivoire','Beige','Marron','Gris','Noir','Jaune','Orange','Rouge','Rose','Violet','Bleu','Vert','Turquoise','Multicolore','Metal/Argent'];
var D = {};
for (var i = 1; i <= 16; i++) D[i] = { name:NAMES[i], photo:null, notes:'', count:0 };

// Charger Supabase au démarrage
(async function() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/drawers?select=*', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var rows = await r.json();
    if (Array.isArray(rows)) rows.forEach(function(row) {
      if (D[row.drawer_number]) {
        D[row.drawer_number].photo = row.photo_url || null;
        D[row.drawer_number].notes = row.notes || '';
        D[row.drawer_number].count = row.count || 0;
      }
    });
  } catch(e) {}
})();

async function sbSave(num) {
  var d = D[num];
  try {
    var r = await fetch(SB_URL + '/rest/v1/drawers?drawer_number=eq.' + num + '&select=id', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var rows = await r.json();
    if (rows && rows.length > 0) {
      await fetch(SB_URL + '/rest/v1/drawers?drawer_number=eq.' + num, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ photo_url: d.photo, notes: d.notes, count: d.count })
      });
    } else {
      await fetch(SB_URL + '/rest/v1/drawers', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({ drawer_number: num, name: d.name, photo_url: d.photo, notes: d.notes, count: d.count })
      });
    }
  } catch(e) {}
}

async function uploadPhoto(file) {
  var reader = new FileReader();
  var b64 = await new Promise(function(res) {
    reader.onload = function(e) { res(e.target.result.split(',')[1]); };
    reader.readAsDataURL(file);
  });
  var r = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'image=' + encodeURIComponent(b64)
  });
  var j = await r.json();
  if (j.success) return j.data.url;
  throw new Error('ImgBB failed');
}

function toggleSidebar() {
  var s = document.getElementById('sidebar');
  var t = document.getElementById('toggleSidebar');
  if (s.classList.contains('open')) {
    s.classList.remove('open');
    t.classList.remove('open');
  } else {
    s.classList.add('open');
    t.classList.add('open');
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('toggleSidebar').classList.remove('open');
}

function openDrawer(num, name) {
  var d = D[num];
  var overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); modal.remove(); } };

  var modal = document.createElement('div');
  modal.className = 'drawer-modal';

  var photoHtml = d.photo
    ? '<img src="' + d.photo + '" alt="">'
    : '<div class="photo-preview-empty">Aucune photo</div>';

  modal.innerHTML =
    '<h2>Tiroir ' + num + ' \u2013 ' + name + '</h2>' +
    '<div class="modal-content">' +
      '<div class="counter-section">' +
        '<div class="counter-label">\uD83E\uDDF6 Nombre de pelotes</div>' +
        '<div class="counter-controls">' +
          '<button class="counter-btn" id="dec' + num + '">\u2212</button>' +
          '<div class="counter-value" id="cnt' + num + '">' + (d.count||0) + '</div>' +
          '<button class="counter-btn" id="inc' + num + '">+</button>' +
        '</div>' +
      '</div>' +
      '<div class="photo-section">' +
        '<div class="photo-preview" id="prev' + num + '">' + photoHtml + '</div>' +
        '<input type="file" id="file' + num + '" accept="image/*">' +
        '<button class="photo-btn" id="pbtn' + num + '">\uD83D\uDCF7 ' + (d.photo ? 'Changer' : 'Ajouter') + ' une photo</button>' +
      '</div>' +
      '<div class="notes-section">' +
        '<label>Notes / R\u00e9f\u00e9rences :</label>' +
        '<textarea id="txt' + num + '">' + (d.notes||'') + '</textarea>' +

```

'</div>' +
'<div class="modal-buttons">' +
  '<button class="save-btn" id="sav' + num + '">\uD83D\uDCBE Enregistrer</button>' +
  '<button class="close-btn" id="cls' + num + '">Fermer</button>' +
'</div>';

document.body.appendChild(overlay);
document.body.appendChild(modal);

document.getElementById(‘inc’ + num).onclick = async function() {
d.count = (d.count||0) + 1;
document.getElementById(‘cnt’ + num).textContent = d.count;
await sbSave(num);
};
document.getElementById(‘dec’ + num).onclick = async function() {
if ((d.count||0) > 0) {
d.count = d.count - 1;
document.getElementById(‘cnt’ + num).textContent = d.count;
await sbSave(num);
}
};
document.getElementById(‘pbtn’ + num).onclick = function() {
document.getElementById(‘file’ + num).click();
};
document.getElementById(‘file’ + num).onchange = async function(e) {
var file = e.target.files[0];
if (!file) return;
document.getElementById(‘loading’).style.display = ‘block’;
try {
var url = await uploadPhoto(file);
d.photo = url;
document.getElementById(‘prev’ + num).innerHTML = ‘<img src="' + url + '" alt="">’;
await sbSave(num);
alert(’\u2705 Photo upload\u00e9e !’);
} catch(err) { alert(’\u274C ’ + err.message); }
document.getElementById(‘loading’).style.display = ‘none’;
};
document.getElementById(‘sav’ + num).onclick = async function() {
d.notes = document.getElementById(‘txt’ + num).value;
await sbSave(num);
alert(’\u2705 Sauvegard\u00e9 !’);
};
document.getElementById(‘cls’ + num).onclick = function() {
overlay.remove(); modal.remove();
};
}

function showAllDrawers() {
var overlay = document.createElement(‘div’);
overlay.className = ‘overlay’;
var modal = document.createElement(‘div’);
modal.className = ‘drawers-grid-modal’;

var html = ‘<h2>\uD83D\uDCE6 Tous les tiroirs</h2><div class="drawers-grid">’;
for (var j = 1; j <= 16; j++) {
var dd = D[j];
html += ‘<div class="drawer-card" onclick="this.closest(\'.drawers-grid-modal\').remove();document.querySelector(\'.overlay\').remove();openDrawer(' + j + ',\'' + dd.name + '\')">’ +
’<div class="drawer-card-num">Tiroir ’ + j + ‘</div>’ +
‘<div class="drawer-card-name">’ + dd.name + ‘</div>’ +
‘<div class="drawer-card-count">\uD83E\uDDF6 ’ + (dd.count||0) + ’ pelote(s)</div>’ +
‘<div class="drawer-card-preview">’ + (dd.photo ? ‘<img src="' + dd.photo + '">’ : ‘\uD83D\uDCF7’) + ‘</div>’ +
‘</div>’;
}
html += ‘</div><div class="modal-buttons"><button class="close-btn" onclick="this.closest(\'.drawers-grid-modal\').remove();document.querySelector(\'.overlay\').remove()">Fermer</button></div>’;
modal.innerHTML = html;

overlay.onclick = function(e) { if (e.target === overlay) { overlay.remove(); modal.remove(); } };
document.body.appendChild(overlay);
document.body.appendChild(modal);
}
