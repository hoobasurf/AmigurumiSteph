<style>
* { box-sizing:border-box;margin:0;padding:0;font-family:'Comic Sans MS',cursive; }
html,body{height:100%;overflow-x:hidden;}

/* ✅ FIX ZOOM iOS/Safari : font-size 16px sur tous les inputs */
input, textarea, select { font-size: 16px !important; }

/* ✅ fond géré par un div#bg, plus de body::before */
.center-zone{display:flex;justify-content:center;align-items:flex-start;padding-top:4.5cm;overflow:hidden;height:auto;}
#visitor-list-container{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;justify-content:center;padding-left:1cm;}
.page{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);column-gap:3mm;row-gap:4mm;flex:0 0 auto;width:calc(2*200px+3mm);height:calc(3*200px+8mm);scroll-snap-align:center;padding:4mm;justify-content:center;margin-top:0;}
.visitor-item{position:relative;width:200px;height:200px;border-radius:12px;overflow:hidden;border:3px solid #fff;box-shadow:0 0 0 3px #f6c2d1,0 6px 14px rgba(0,0,0,0.25),inset 0 0 0 1px rgba(255,255,255,0.4);background:#ffe6f0;}
.visitor-item img{width:100%;height:100%;object-fit:cover;border-radius:12px;cursor:pointer;display:block;filter:brightness(1.05) contrast(1.05) saturate(0.95);transition:filter 0.3s,transform 0.3s;position:relative;z-index:2;}
.visitor-item img:hover{transform:scale(1.03);}
.visitor-item::after{content:””;position:absolute;inset:0;background:rgba(255,230,240,0.12);pointer-events:none;z-index:1;}
.visitor-item p{position:absolute;bottom:2px;width:100%;font-size:14px;color:#b84c6f;font-weight:bold;text-align:center;text-shadow:1px 1px 2px rgba(255,255,255,0.8);z-index:3;}
.delete-btn{position:absolute;top:6px;right:6px;width:24px;height:24px;background:#ffb6c1;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;z-index:5;font-size:16px;transition:transform 0.2s,box-shadow 0.2s;}
.delete-btn:hover{transform:scale(1.2);box-shadow:0 2px 6px rgba(0,0,0,0.25);}
#sidebar{position:fixed;top:0;left:-220px;width:220px;height:100vh;background:rgba(255,230,240,0.2);border-right:2px solid #b67385;padding:20px;transition:left .3s;z-index:10;}
#sidebar.sidebar-open{left:0;}
#toggleSidebar{position:absolute;top:50%;right:-30px;width:30px;height:60px;background:#ffb6c1;border-radius:0 12px 12px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;}
#sidebar button{width:auto;padding:8px 16px;border-radius:16px;border:none;background:#ffb6c1;color:#fff;cursor:pointer;font-weight:bold;display:block;margin-top:10px;}
#sidebar button:hover{transform:scale(1.03);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:10001;}
.modal .modal-box{background:#ffe6f0;padding:16px 24px;border-radius:20px;border:3px solid #b67385;display:flex;flex-direction:column;gap:10px;align-items:center;min-width:200px;font-family:‘Comic Sans MS’,cursive;}
.modal input{padding:6px 12px;border-radius:10px;border:2px solid #b67385;width:100%;}
.modal button{padding:6px 14px;border:none;background:#ffb6c1;color:#fff;border-radius:12px;cursor:pointer;font-weight:bold;width:100%;}
#zoomModal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:10000;overflow:hidden;}
.zoom-content{position:relative;width:80vw;height:60vh;overflow:hidden;display:flex;align-items:center;gap:20px;margin-bottom:20px;}
#mainZoom{position:absolute;top:0;left:0;max-width:60%;max-height:60vh;border:4px solid #b67385;border-radius:24px;cursor:grab;user-select:none;}
#zoomLegend{position:absolute;top:10px;right:10px;min-width:150px;max-width:30%;background:#ffe6f0;border:2px solid #b84c6f;border-radius:12px;padding:8px;color:#b84c6f;font-size:14px;cursor:grab;user-select:none;z-index:2;}
#zoomModal .thumbs{display:flex;gap:8px;max-width:80%;overflow-x:auto;margin-bottom:20px;}
#zoomModal .thumbs img{width:50px;height:50px;object-fit:cover;border-radius:12px;border:2px solid #b67385;cursor:pointer;}
.closeZoom{position:absolute;top:12px;right:12px;width:28px;height:28px;background:#ffb6c1;color:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:18px;font-weight:bold;z-index:10001;transition:transform 0.2s;}
.closeZoom:hover{transform:scale(1.2);}
.actions{display:flex;gap:12px;align-items:center;}
.icon-btn{background:none!important;border:none;padding:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn svg{background:none!important;fill:none;stroke:#b84c6f;width:22px;height:22px;transition:transform 0.2s;}
.icon-btn:hover svg{transform:scale(1.2);}
#likeCount,#commentCount{font-family:‘Courier New’,monospace;font-weight:bold;color:#b84c6f;font-size:14px;min-width:18px;}
#ownerPhoto{width:76px;height:76px;border-radius:50%;position:fixed;top:10px;right:10px;z-index:10000;background:#ffe6f0;border:3px solid #b84c6f;cursor:pointer;box-shadow:0 2px 12px rgba(184,76,111,0.3);transition:transform 0.2s;object-fit:cover;}
#ownerPhoto:hover{transform:scale(1.08);}
.pink-file-btn{background:linear-gradient(#ffd6e6,#ffb6c1);border:2px solid #b67385;border-radius:16px;padding:8px 14px;color:#b84c6f;font-weight:bold;cursor:pointer;width:100%;transition:transform 0.15s,box-shadow 0.15s;}
.pink-file-btn:hover{transform:scale(1.03);box-shadow:0 4px 10px rgba(0,0,0,0.15);}
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;justify-content:center;align-items:center;z-index:20000;}
.chat-window{width:360px;height:230px;background:#ffe6f0;border-radius:20px;border:2px solid #b67385;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 24px rgba(0,0,0,0.25);position:relative;transition:width 0.3s,height 0.3s;}
.chat-header{height:40px;background:linear-gradient(#ffd6e6,#ffb6c1);display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-weight:bold;color:#b84c6f;flex-shrink:0;font-size:14px;}
.chat-body{flex:1;display:flex;min-height:0;}
.chat-sidebar{width:120px;background:#fff5fa;border-right:2px solid #f3b3c8;overflow-y:auto;}
.chat-user{display:flex;align-items:center;gap:6px;padding:4px;cursor:pointer;transition:background 0.2s;font-size:12px;}
.chat-user.active{background:#ffd6e6;}
.chat-user img{border-radius:50%;width:28px;height:28px;object-fit:cover;}
.chat-content{flex:1;display:flex;flex-direction:column;min-height:0;}
.chat-messages{flex:1;padding:6px;overflow-y:auto;background:#fffafa;font-size:12px;}
.msg{max-width:70%;padding:4px 8px;margin-bottom:4px;border-radius:12px;}
.msg-me{background:#ffb6c1;align-self:flex-end;}
.msg-them{background:#ffffff;border:1px solid #f3b3c8;}
.chat-input{display:flex;padding:4px;gap:4px;}
.chat-input input{flex:1;border-radius:10px;border:2px solid #b67385;padding:4px 6px;}
.chat-icon-btn{background:transparent;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;}
.expanded .chat-window{width:720px;height:460px;border-radius:24px;}
body.modal-open{overflow:hidden;touch-action:none;}
@media(max-width:480px){
.page{grid-template-columns:repeat(2,120px);grid-template-rows:repeat(3,120px);}
.visitor-item{width:120px;height:120px;}
.modal .modal-box{min-width:180px;}
}
#photoOverlay{display:none;position:fixed;inset:0;z-index:99999;background-image:url(‘DF7FFC0E-2321-4B88-8667-F6079CE30D5A.png’);background-size:cover;background-position:center;justify-content:center;align-items:center;flex-direction:column;gap:28px;cursor:pointer;}
#photoOverlay::before{content:’’;position:absolute;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(2px);}
#photoOverlay.visible{display:flex;}
#photoOverlay>*{position:relative;z-index:1;}
.overlay-ring-wrap{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
.overlay-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,182,193,0.45);animation:ringPulse 2.4s ease-out infinite;}
.overlay-ring:nth-child(1){width:220px;height:220px;animation-delay:0s;}
.overlay-ring:nth-child(2){width:270px;height:270px;animation-delay:0.6s;}
.overlay-ring:nth-child(3){width:320px;height:320px;animation-delay:1.2s;}
@keyframes ringPulse{0%{opacity:0.6;transform:scale(0.9);}100%{opacity:0;transform:scale(1.15);}}
#overlayImg{width:200px;height:200px;border-radius:50%;object-fit:cover;border:4px solid #ffb6c1;box-shadow:0 0 50px rgba(255,100,150,0.7),0 0 100px rgba(255,100,150,0.3);position:relative;z-index:2;}
@keyframes popIn{from{transform:scale(0.1) rotateY(90deg);opacity:0;}to{transform:scale(1) rotateY(0deg);opacity:1;}}
#overlayPrenom{font-family:‘Georgia’,‘Palatino’,serif;font-size:54px;font-weight:normal;font-style:italic;letter-spacing:8px;color:#ffe6f0;-webkit-text-stroke:1.5px #1a0005;text-shadow:0 1px 0 #c8637a,0 2px 0 #b84c6f,0 3px 0 #a03060,0 4px 0 #8a1a40,0 5px 8px rgba(0,0,0,0.6),0 10px 20px rgba(0,0,0,0.4);animation:prenomIn 0.7s 0.2s cubic-bezier(0.34,1.56,0.64,1) both,prenomFloat 5s 1s ease-in-out infinite;}
@keyframes prenomIn{from{transform:translateY(30px) scale(0.6);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
@keyframes prenomFloat{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-9px) rotate(1deg);}}
#overlayHint{font-size:11px;color:rgba(255,230,240,0.5);letter-spacing:3px;font-family:‘Georgia’,serif;font-style:italic;animation:fadeIn 1.5s 1s ease both;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>

</head>

<script type="module">
const SB_URL="https://kdgxbmqwhpuctjtlygrt.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZ3hibXF3aHB1Y3RqdGx5Z3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjY0NzQsImV4cCI6MjA5MDgwMjQ3NH0.9RsIj_bQgJskg9raRGN6uQJwUUlByTvWAFF2Eq9f6KM";
const SB_HEADERS={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};

// ✅ FIX ZOOM iOS/Safari — reset viewport après fermeture du clavier
function resetViewport() {
  setTimeout(() => {
    const meta = document.querySelector('meta[name="viewport"]');
    if (!meta) return;
    meta.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0');
    setTimeout(() => {
      meta.setAttribute('content', 'width=device-width, initial-scale=1.0');
      // ✅ Force le fond à rester visible après reset viewport Safari
      const bg = document.getElementById('bg');
      if (bg) { bg.style.display = 'none'; bg.offsetHeight; bg.style.display = ''; }
    }, 50);
  }, 150);
}
document.addEventListener('focusout', resetViewport);

function parseJsonField(val){
  if(Array.isArray(val))return val;
  if(!val||val===''||val==='null')return[];
  if(typeof val==='string'){try{const p=JSON.parse(val);return Array.isArray(p)?p:[];}catch(e){return[];}}
  return[];
}

const supabase={
  from:(table)=>({
    select:(cols="*")=>({
      eq:(col,val)=>({
        single:async()=>{const r=await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${encodeURIComponent(val)}&limit=1`,{headers:SB_HEADERS});const d=await r.json();if(!r.ok)return{data:null,error:d};return{data:d[0]||null,error:d[0]?null:{message:'Not found'}};},
        order:(col2,{ascending}={})=>({limit:async(n)=>{const dir=ascending?'asc':'desc';const r=await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&${col}=eq.${encodeURIComponent(val)}&order=${col2}.${dir}&limit=${n}`,{headers:SB_HEADERS});const d=await r.json();return{data:r.ok?d:null,error:r.ok?null:d};}})
      }),
      neq:async(col,val)=>{const r=await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&${col}=neq.${encodeURIComponent(val)}`,{headers:SB_HEADERS});const d=await r.json();return{data:r.ok?d:null,error:r.ok?null:d};},
      or:(filter)=>({order:(col2,{ascending}={})=>({async then(resolve){const dir=ascending?'asc':'desc';const r=await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&or=(${encodeURIComponent(filter)})&order=${col2}.${dir}`,{headers:SB_HEADERS});const d=await r.json();resolve({data:r.ok?d:null,error:r.ok?null:d});}})}),
      order:(col2,{ascending}={})=>({async then(resolve){const dir=ascending?'asc':'desc';const r=await fetch(`${SB_URL}/rest/v1/${table}?select=${cols}&order=${col2}.${dir}`,{headers:SB_HEADERS});const d=await r.json();resolve({data:r.ok?d:null,error:r.ok?null:d});}})
    }),
    insert:async(rows)=>{const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...SB_HEADERS,"Prefer":"return=minimal"},body:JSON.stringify(Array.isArray(rows)?rows:[rows])});if(!r.ok){const d=await r.json();return{data:null,error:d};}return{data:true,error:null};},
    upsert:async(row,opts={})=>{const h={...SB_HEADERS,"Prefer":"resolution=merge-duplicates,return=minimal"};if(opts.onConflict)h["Prefer"]+=`,on_conflict=${opts.onConflict}`;const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:h,body:JSON.stringify(row)});if(!r.ok){const d=await r.json();return{data:null,error:d};}return{data:true,error:null};},
    update:(updates)=>({eq:async(col,val)=>{
      const r=await fetch(`${SB_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(String(val))}`,{method:'PATCH',headers:{...SB_HEADERS,"Prefer":"return=minimal"},body:JSON.stringify(updates)});
      if(!r.ok){let d={};try{d=await r.json();}catch(e){}return{error:d};}
      return{error:null};
    }}),
    delete:()=>({eq:async(col,val)=>{const r=await fetch(`${SB_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`,{method:'DELETE',headers:SB_HEADERS});return{error:r.ok?null:await r.json()};}})
  })
};

async function refreshCreations(){

      else if(c.image_path)zoomGroup=[c.image_path];
      return{

let saveTimeout=null;
async function savePosition(x,y,isLegend){
  if(!currentZoom||!currentZoom.id)return;
  clearTimeout(saveTimeout);
  saveTimeout=setTimeout(async()=>{
    if(isLegend){
      currentZoom.x_legend=parseFloat(x);
      currentZoom.y_legend=parseFloat(y);
      currentZoom.scale_legend=parseFloat(zoomLegend.dataset.scale)||1;
      await supabase.from('creations').update({x_legend:currentZoom.x_legend,y_legend:currentZoom.y_legend,scale_legend:currentZoom.scale_legend}).eq('id',currentZoom.id);
    }else{
      currentZoom.x=parseFloat(x);
      currentZoom.y=parseFloat(y);
      currentZoom.scale=parseFloat(mainZoom.dataset.scale)||1;
      await supabase.from('creations').update({x:currentZoom.x,y:currentZoom.y,scale:currentZoom.scale}).eq('id',currentZoom.id);
    }
    const idx=creations.findIndex(c=>c.id===currentZoom.id);
    if(idx!==-1){
      if(isLegend){creations[idx].x_legend=currentZoom.x_legend;creations[idx].y_legend=currentZoom.y_legend;creations[idx].scale_legend=currentZoom.scale_legend;}
      else{creations[idx].x=currentZoom.x;creations[idx].y=currentZoom.y;creations[idx].scale=currentZoom.scale;}
    }
  },600);
}

function makeDraggable(el,isLegend=false){
  let isDragging=false,startX,startY;
  el.dataset.x=el.dataset.x||0;el.dataset.y=el.dataset.y||0;el.dataset.scale=el.dataset.scale||1;
  el.addEventListener('mousedown',e=>{isDragging=true;startX=e.clientX;startY=e.clientY;});
  document.addEventListener('mousemove',e=>{if(!isDragging)return;let newX=parseFloat(el.dataset.x)+(e.clientX-startX);let newY=parseFloat(el.dataset.y)+(e.clientY-startY);el.dataset.x=newX;el.dataset.y=newY;el.style.transform=`translate(${newX}px,${newY}px) scale(${el.dataset.scale})`;startX=e.clientX;startY=e.clientY;savePosition(newX,newY,isLegend);});
  document.addEventListener('mouseup',()=>{isDragging=false;});
  el.addEventListener('touchstart',e=>{isDragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;});
  el.addEventListener('touchmove',e=>{if(!isDragging)return;e.preventDefault();let newX=parseFloat(el.dataset.x)+(e.touches[0].clientX-startX);let newY=parseFloat(el.dataset.y)+(e.touches[0].clientY-startY);el.dataset.x=newX;el.dataset.y=newY;el.style.transform=`translate(${newX}px,${newY}px) scale(${el.dataset.scale})`;startX=e.touches[0].clientX;startY=e.touches[0].clientY;savePosition(newX,newY,isLegend);},{passive:false});
  el.addEventListener('touchend',()=>{isDragging=false;});
}

function makePinchZoom(el,isLegend=false){
  el.dataset.scale=el.dataset.scale||1;let initialDistance=null,initialScale=1;
  el.addEventListener('wheel',e=>{e.preventDefault();let scale=parseFloat(el.dataset.scale);scale+=e.deltaY*-0.001;scale=Math.min(Math.max(0.5,scale),3);el.dataset.scale=scale;el.style.transform=`translate(${el.dataset.x||0}px,${el.dataset.y||0}px) scale(${scale})`;savePosition(el.dataset.x,el.dataset.y,isLegend);},{passive:false});
  el.addEventListener('touchstart',e=>{if(e.touches.length===2){initialDistance=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);initialScale=parseFloat(el.dataset.scale);}});
  el.addEventListener('touchmove',e=>{if(e.touches.length===2&&initialDistance){e.preventDefault();let cd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);let scale=initialScale*(cd/initialDistance);scale=Math.min(Math.max(0.5,scale),3);el.dataset.scale=scale;el.style.transform=`translate(${el.dataset.x||0}px,${el.dataset.y||0}px) scale(${scale})`;savePosition(el.dataset.x,el.dataset.y,isLegend);}},{passive:false});
  el.addEventListener('touchend',()=>{initialDistance=null;});
}

  mainZoom.dataset.x=x;mainZoom.dataset.y=y;mainZoom.dataset.scale=s;
  mainZoom.style.transform=`translate(${x}px,${y}px) scale(${s})`;

document.getElementById('confirmAdd').onclick=async()=>{
  const name=document.getElementById('photoName').value.trim();
  const legend=document.getElementById('photoLegend').value.trim();
  const files=document.getElementById('multiPhoto').files;
  if(!name||!files.length){alert("Mettre un nom et choisir au moins une photo");return;}
  try{
    const imageUrls=[];
    for(let i=0;i<files.length;i++){
      try{
        const compressed=await new Promise(resolve=>{
          const reader=new FileReader();
          reader.onload=e2=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');let w=img.width,h=img.height,max=1200;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);canvas.toBlob(blob=>resolve(new File([blob],'photo.jpg',{type:'image/jpeg'})),'image/jpeg',0.75);};img.src=e2.target.result;};reader.readAsDataURL(files[i]);
        });
        const formData=new FormData();formData.append('image',compressed);
        const res=await fetch('https://api.imgbb.com/1/upload?key=1612fdd94e39f24c3d14f1864f41d591',{method:'POST',body:formData});
        const json=await res.json();
        if(!json.success)throw new Error('ImgBB: '+JSON.stringify(json));
        imageUrls.push(json.data.url);
      }catch(err){alert('❌ Erreur photo '+(i+1)+': '+(err?.message||String(err)));}
    }
    if(!imageUrls.length){alert('Aucune image uploadée avec succès');return;}
    const{error:insertError}=await supabase.from('creations').insert([{name,legend:legend||'',image_path:imageUrls[0],images:imageUrls,likes:[],comments:[],x:0,y:0,scale:1,x_legend:0,y_legend:0,scale_legend:1}]);
    if(insertError){alert('Erreur insertion: '+insertError.message);return;}
    addModal.style.display='none';document.getElementById('photoName').value='';document.getElementById('photoLegend').value='';document.getElementById('multiPhoto').value='';fileInfo.textContent='';
    await refreshCreations();
  }catch(error){alert('Erreur: '+error.message);}
};
