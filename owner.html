<style>
* { box-sizing:border-box;margin:0;padding:0;font-family:'Comic Sans MS',cursive; }
html,body{height:100%;overflow-x:hidden;}
input, textarea, select { font-size: 16px !important; }
.center-zone{display:flex;justify-content:center;align-items:flex-start;padding-top:4.5cm;overflow:hidden;height:auto;}
#visitor-list-container{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;justify-content:center;padding-left:1cm;}
.page{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(3,1fr);column-gap:3mm;row-gap:4mm;flex:0 0 auto;width:calc(2*200px+3mm);height:calc(3*200px+8mm);scroll-snap-align:center;padding:4mm;justify-content:center;margin-top:0;}
.visitor-item{position:relative;width:200px;height:200px;border-radius:12px;overflow:hidden;border:3px solid #fff;box-shadow:0 0 0 3px #f6c2d1,0 6px 14px rgba(0,0,0,0.25),inset 0 0 0 1px rgba(255,255,255,0.4);background:#ffe6f0;}
.visitor-item img{width:100%;height:100%;object-fit:cover;border-radius:12px;cursor:pointer;display:block;filter:brightness(1.05) contrast(1.05) saturate(0.95);transition:filter 0.3s,transform 0.3s;position:relative;z-index:2;}
.visitor-item img:hover{transform:scale(1.03);}
.visitor-item::after{content:"";position:absolute;inset:0;background:rgba(255,230,240,0.12);pointer-events:none;z-index:1;}
.visitor-item p{position:absolute;bottom:2px;width:100%;font-size:14px;color:#b84c6f;font-weight:bold;text-align:center;text-shadow:1px 1px 2px rgba(255,255,255,0.8);z-index:3;}
.delete-btn{position:absolute;top:6px;right:6px;width:24px;height:24px;background:#ffb6c1;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;z-index:5;font-size:16px;transition:transform 0.2s,box-shadow 0.2s;}
.delete-btn:hover{transform:scale(1.2);box-shadow:0 2px 6px rgba(0,0,0,0.25);}
#sidebar{position:fixed;top:0;left:-220px;width:220px;height:100vh;background:rgba(255,230,240,0.2);border-right:2px solid #b67385;padding:20px;transition:left .3s;z-index:10;}
#sidebar.sidebar-open{left:0;}
#toggleSidebar{position:absolute;top:50%;right:-30px;width:30px;height:60px;background:#ffb6c1;border-radius:0 12px 12px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;}
#sidebar button{width:auto;padding:8px 16px;border-radius:16px;border:none;background:#ffb6c1;color:#fff;cursor:pointer;font-weight:bold;display:block;margin-top:10px;}
#sidebar button:hover{transform:scale(1.03);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:10001;}
.modal .modal-box{background:#ffe6f0;padding:16px 24px;border-radius:20px;border:3px solid #b67385;display:flex;flex-direction:column;gap:10px;align-items:center;min-width:200px;font-family:'Comic Sans MS',cursive;}
.modal input{padding:6px 12px;border-radius:10px;border:2px solid #b67385;width:100%;}
.modal button{padding:6px 14px;border:none;background:#ffb6c1;color:#fff;border-radius:12px;cursor:pointer;font-weight:bold;width:100%;}
#zoomModal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:10000;overflow:hidden;}
.zoom-content{position:relative;width:80vw;height:60vh;overflow:hidden;display:flex;align-items:center;gap:20px;margin-bottom:20px;}
#mainZoom{position:absolute;top:0;left:0;max-width:60%;max-height:60vh;border:4px solid #b67385;border-radius:24px;cursor:grab;user-select:none;}
#zoomLegend{position:absolute;top:10px;right:10px;min-width:150px;max-width:30%;background:#ffe6f0;border:2px solid #b84c6f;border-radius:12px;padding:8px;color:#b84c6f;font-size:14px;cursor:grab;user-select:none;z-index:2;}
#zoomModal .thumbs{display:flex;gap:8px;max-width:80%;overflow-x:auto;margin-bottom:20px;}
#zoomModal .thumbs img{width:50px;height:50px;object-fit:cover;border-radius:12px;border:2px solid #b67385;cursor:pointer;}
.closeZoom{position:absolute;top:12px;right:12px;width:28px;height:28px;background:#ffb6c1;color:#fff;border-radius:50%;display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:18px;font-weight:bold;z-index:10001;transition:transform 0.2s;}
.closeZoom:hover{transform:scale(1.2);}
.actions{display:flex;gap:12px;align-items:center;}
.icon-btn{background:none!important;border:none;padding:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.icon-btn svg{background:none!important;fill:none;stroke:#b84c6f;width:22px;height:22px;transition:transform 0.2s;}
.icon-btn:hover svg{transform:scale(1.2);}
#likeCount,#commentCount{font-family:'Courier New',monospace;font-weight:bold;color:#b84c6f;font-size:14px;min-width:18px;}
#ownerPhoto{width:76px;height:76px;border-radius:50%;position:fixed;top:10px;right:10px;z-index:10000;background:#ffe6f0;border:3px solid #b84c6f;cursor:pointer;box-shadow:0 2px 12px rgba(184,76,111,0.3);transition:transform 0.2s;object-fit:cover;}
#ownerPhoto:hover{transform:scale(1.08);}
#editPhotoBtn{position:fixed;top:92px;right:6px;z-index:10001;background:linear-gradient(#ffd6e6,#ffb6c1);border:2px solid #b67385;border-radius:14px;padding:7px 13px;color:#b84c6f;font-weight:bold;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(184,76,111,0.3);display:none;white-space:nowrap;font-family:'Comic Sans MS',cursive;animation:popBtn 0.2s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes popBtn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
#ownerRings{position:fixed;top:10px;right:10px;width:76px;height:76px;pointer-events:none;z-index:9999;opacity:0;transition:opacity 0.3s;}
.owner-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,182,193,0.7);opacity:0;}
.owner-ring:nth-child(1){width:76px;height:76px;top:0;left:0;}
.owner-ring:nth-child(2){width:96px;height:96px;top:-10px;left:-10px;}
.owner-ring:nth-child(3){width:116px;height:116px;top:-20px;left:-20px;}
#ownerRings.pulsing .owner-ring:nth-child(1){animation:ownerRing 1.2s ease-out infinite;}
#ownerRings.pulsing .owner-ring:nth-child(2){animation:ownerRing 1.2s ease-out 0.3s infinite;}
#ownerRings.pulsing .owner-ring:nth-child(3){animation:ownerRing 1.2s ease-out 0.6s infinite;}
@keyframes ownerRing{0%{opacity:0.8;transform:scale(0.85);}100%{opacity:0;transform:scale(1.2);}}
.pink-file-btn{background:linear-gradient(#ffd6e6,#ffb6c1);border:2px solid #b67385;border-radius:16px;padding:8px 14px;color:#b84c6f;font-weight:bold;cursor:pointer;width:100%;transition:transform 0.15s,box-shadow 0.15s;}
.pink-file-btn:hover{transform:scale(1.03);box-shadow:0 4px 10px rgba(0,0,0,0.15);}
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;justify-content:center;align-items:center;z-index:20000;}
.chat-window{width:360px;height:230px;background:#ffe6f0;border-radius:20px;border:2px solid #b67385;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 24px rgba(0,0,0,0.25);position:relative;transition:width 0.3s,height 0.3s;}
.chat-header{height:40px;background:linear-gradient(#ffd6e6,#ffb6c1);display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-weight:bold;color:#b84c6f;flex-shrink:0;font-size:14px;}
.chat-body{flex:1;display:flex;min-height:0;}
.chat-sidebar{width:120px;background:#fff5fa;border-right:2px solid #f3b3c8;overflow-y:auto;}
.chat-user{display:flex;align-items:center;gap:6px;padding:4px;cursor:pointer;transition:background 0.2s;font-size:12px;}
.chat-user.active{background:#ffd6e6;}
.chat-user img{border-radius:50%;width:28px;height:28px;object-fit:cover;}
.chat-content{flex:1;display:flex;flex-direction:column;min-height:0;}
.chat-messages{flex:1;padding:6px;overflow-y:auto;background:#fffafa;font-size:12px;}
.msg{max-width:70%;padding:4px 8px;margin-bottom:4px;border-radius:12px;}
.msg-me{background:#ffb6c1;align-self:flex-end;}
.msg-them{background:#ffffff;border:1px solid #f3b3c8;}
.chat-input{display:flex;padding:4px;gap:4px;}
.chat-input input{flex:1;border-radius:10px;border:2px solid #b67385;padding:4px 6px;}
.chat-icon-btn{background:transparent;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;}
.expanded .chat-window{width:720px;height:460px;border-radius:24px;}
body.modal-open{overflow:hidden;touch-action:none;}
@media(max-width:480px){
.page{grid-template-columns:repeat(2,120px);grid-template-rows:repeat(3,120px);}
.visitor-item{width:120px;height:120px;}
.modal .modal-box{min-width:180px;}
}
#photoOverlay{display:none;position:fixed;inset:0;z-index:99999;background-image:url('DF7FFC0E-2321-4B88-8667-F6079CE30D5A.png');background-size:cover;background-position:center;justify-content:center;align-items:center;flex-direction:column;gap:28px;cursor:pointer;}
#photoOverlay::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(2px);}
#photoOverlay.visible{display:flex;}
#photoOverlay>*{position:relative;z-index:1;}
.overlay-ring-wrap{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
.overlay-ring{position:absolute;border-radius:50%;border:2px solid rgba(255,182,193,0.45);animation:ringPulse 2.4s ease-out infinite;}
.overlay-ring:nth-child(1){width:220px;height:220px;animation-delay:0s;}
.overlay-ring:nth-child(2){width:270px;height:270px;animation-delay:0.6s;}
.overlay-ring:nth-child(3){width:320px;height:320px;animation-delay:1.2s;}
@keyframes ringPulse{0%{opacity:0.6;transform:scale(0.9);}100%{opacity:0;transform:scale(1.15);}}
#overlayChangeHint{font-size:12px;color:rgba(255,230,240,0.75);letter-spacing:2px;font-family:'Georgia',serif;font-style:italic;margin-top:-18px;animation:fadeIn 1.2s 0.5s ease both;}
#overlayImg{width:200px;height:200px;border-radius:50%;object-fit:cover;border:4px solid #ffb6c1;box-shadow:0 0 50px rgba(255,100,150,0.7),0 0 100px rgba(255,100,150,0.3);position:relative;z-index:2;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
#overlayImg:active{transform:scale(0.96);}
@keyframes popIn{from{transform:scale(0.1) rotateY(90deg);opacity:0;}to{transform:scale(1) rotateY(0deg);opacity:1;}}
#overlayPrenom{font-family:'Georgia','Palatino',serif;font-size:54px;font-weight:normal;font-style:italic;letter-spacing:8px;color:#ffe6f0;-webkit-text-stroke:1.5px #1a0005;text-shadow:0 1px 0 #c8637a,0 2px 0 #b84c6f,0 3px 0 #a03060,0 4px 0 #8a1a40,0 5px 8px rgba(0,0,0,0.6),0 10px 20px rgba(0,0,0,0.4);animation:prenomIn 0.7s 0.2s cubic-bezier(0.34,1.56,0.64,1) both,prenomFloat 5s 1s ease-in-out infinite;}
@keyframes prenomIn{from{transform:translateY(30px) scale(0.6);opacity:0;}to{transform:translateY(0) scale(1);opacity:1;}}
@keyframes prenomFloat{0%,100%{transform:translateY(0) rotate(-1deg);}50%{transform:translateY(-9px) rotate(1deg);}}
#overlayHint{font-size:11px;color:rgba(255,230,240,0.5);letter-spacing:3px;font-family:'Georgia',serif;font-style:italic;animation:fadeIn 1.5s 1s ease both;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== BOUTON TIKTOK ===== */
#tiktokBtn{position:fixed;top:148px;right:10px;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#ffd6e6,#ffb6c1);border:2px solid #b67385;box-shadow:0 2px 10px rgba(184,76,111,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10000;transition:transform 0.2s,box-shadow 0.2s;}
#tiktokBtn:hover{transform:scale(1.12);box-shadow:0 4px 18px rgba(184,76,111,0.55);}
#tiktokBtn svg{width:20px;height:20px;}

/* ===== OVERLAY TIKTOK ===== */
#tiktokOverlay{display:none;position:fixed;inset:0;background:#0d0008;z-index:50000;overflow:hidden;}
#tiktokOverlay.visible{display:block;}

/* Le feed ne scroll PAS — tout est géré par translateY sur le track */
#tiktokFeed{
position:relative;width:100%;height:100%;
overflow:hidden;
touch-action:none;
}

/* Track : toutes les slides empilées verticalement */
#tiktokTrack{
position:absolute;top:0;left:0;width:100%;
will-change:transform;
transition:transform 0.38s cubic-bezier(0.4,0,0.2,1);
}

.tiktok-slide{
width:100vw;height:100vh;height:100svh;
position:relative;overflow:hidden;background:#0d0008;
}
.tiktok-photos{
display:flex;width:100%;height:100%;
overflow-x:scroll;scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;scrollbar-width:none;
touch-action:pan-x;
}
.tiktok-photos::-webkit-scrollbar{display:none;}
.tiktok-photo-item{
flex:0 0 100vw;width:100vw;height:100vh;height:100svh;
scroll-snap-align:start;scroll-snap-stop:always;
position:relative;overflow:hidden;
}
.tiktok-photo-item .photo-bg{
position:absolute;inset:0;background-size:cover;background-position:center;
filter:blur(24px) brightness(0.35) saturate(1.4);
transform:scale(1.1);z-index:0;pointer-events:none;
}
.tiktok-photo-item img{
position:absolute;inset:0;width:100%;height:100%;
object-fit:cover;object-position:center;z-index:1;
pointer-events:none;user-select:none;
-webkit-user-drag:none;-webkit-touch-callout:none;display:block;
}
.tiktok-slide::after{
content:’’;position:absolute;bottom:0;left:0;right:0;height:62%;
background:linear-gradient(to top,rgba(13,0,8,0.96) 0%,rgba(13,0,8,0.55) 45%,transparent 100%);
pointer-events:none;z-index:2;
}
.tiktok-photo-counter{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);border:1px solid rgba(255,182,193,0.35);border-radius:20px;padding:4px 14px;font-size:12px;color:#ffe6f0;z-index:6;display:none;letter-spacing:1px;}
.tiktok-photo-counter.multi{display:block;}
.tiktok-dots{position:absolute;bottom:210px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:5;}
.tiktok-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,230,240,0.3);transition:background 0.25s,transform 0.25s;}
.tiktok-dot.active{background:#ffb6c1;transform:scale(1.45);box-shadow:0 0 6px rgba(255,182,193,0.8);}
.tiktok-info{position:absolute;bottom:178px;left:14px;z-index:6;color:#ffe6f0;pointer-events:none;max-width:62%;}
.tiktok-info .t-title{font-size:17px;font-weight:bold;text-shadow:0 2px 10px rgba(0,0,0,0.9);margin-bottom:5px;line-height:1.2;}
.tiktok-info .t-legend{font-size:13px;color:rgba(255,230,240,0.82);text-shadow:0 1px 5px rgba(0,0,0,0.8);line-height:1.4;}
.tiktok-bar{position:absolute;bottom:40px;right:14px;z-index:6;display:flex;flex-direction:column;align-items:center;gap:18px;}
.tiktok-react-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;-webkit-tap-highlight-color:transparent;color:#ffe6f0;}
.tiktok-react-btn svg{width:40px;height:40px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7));transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1);}
.tiktok-react-btn:active svg{transform:scale(1.4);}
.tiktok-react-btn.liked svg{stroke:#ff2d78;fill:#ff2d78;filter:drop-shadow(0 0 10px rgba(255,45,120,0.8));}
.tiktok-react-btn span{font-size:13px;font-weight:bold;text-shadow:0 1px 4px rgba(0,0,0,0.9);}

.tk-heart{position:fixed;pointer-events:none;z-index:60002;animation:tkHeartFly var(–dur,1s) ease-out forwards;will-change:transform,opacity;line-height:1;}
@keyframes tkHeartFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(var(–r0));}70%{opacity:0.85;}100%{opacity:0;transform:translate(var(–dx),var(–dy)) scale(var(–sf)) rotate(var(–r1));}}

#tkCommentModal{display:none;position:fixed;inset:0;z-index:60001;background:rgba(0,0,0,0.55);align-items:flex-end;justify-content:center;}
#tkCommentModal.visible{display:flex;}
#tkCommentBox{width:100%;max-width:500px;background:rgba(13,0,8,0.97);backdrop-filter:blur(20px);border-top:2px solid rgba(255,182,193,0.4);border-radius:22px 22px 0 0;padding:8px 16px max(env(safe-area-inset-bottom,0px),20px);max-height:70vh;display:flex;flex-direction:column;gap:8px;}
#tkCommentHandle{width:40px;height:4px;background:rgba(255,182,193,0.45);border-radius:2px;margin:4px auto 8px;flex-shrink:0;}
#tkCommentTitle{color:#ffb6c1;font-size:15px;font-weight:bold;text-align:center;margin-bottom:4px;flex-shrink:0;}
#tkCommentList{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;max-height:40vh;padding-bottom:4px;}
.tk-comment-item{display:flex;align-items:flex-start;gap:8px;color:#ffe6f0;font-size:13px;}
.tk-comment-item img{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;}
#tkCommentInputRow{display:flex;gap:8px;align-items:center;margin-top:6px;flex-shrink:0;}
#tkCommentInputRow input{flex:1;background:rgba(255,230,240,0.1);border:1px solid rgba(255,182,193,0.4);border-radius:24px;color:#ffe6f0;font-size:14px;padding:8px 14px;outline:none;}
#tkCommentInputRow input::placeholder{color:rgba(255,230,240,0.38);}
#tkCommentSend{background:linear-gradient(135deg,#ff2d78,#b84c6f);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:16px;box-shadow:0 2px 8px rgba(255,45,120,0.5);flex-shrink:0;}

#closeTiktok{position:fixed;top:14px;left:14px;width:38px;height:38px;background:rgba(13,0,8,0.6);backdrop-filter:blur(8px);border:2px solid rgba(255,182,193,0.5);border-radius:50%;display:none;align-items:center;justify-content:center;color:#ffe6f0;font-size:20px;font-weight:bold;cursor:pointer;z-index:50001;transition:transform 0.2s,background 0.2s;}
#closeTiktok.visible{display:flex;}
#closeTiktok:hover{transform:scale(1.12);background:rgba(255,45,120,0.45);}

/* ===== MODAL NOTIFICATIONS ===== */
#notifModal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;z-index:199999;}
#notifModal.visible{display:flex;}
#notifBox{background:#ffe6f0;border:3px solid #b67385;border-radius:24px;padding:24px;max-width:300px;width:90%;display:flex;flex-direction:column;align-items:center;gap:14px;font-family:‘Comic Sans MS’,cursive;text-align:center;}
#notifBox h3{color:#b84c6f;font-size:18px;}
#notifBox p{color:#b84c6f;font-size:13px;line-height:1.5;}
#notifStatusIcon{font-size:44px;}
.notif-btn-yes{background:linear-gradient(#ffd6e6,#ffb6c1);border:2px solid #b67385;border-radius:14px;padding:10px 24px;color:#b84c6f;font-weight:bold;font-size:15px;cursor:pointer;width:100%;font-family:‘Comic Sans MS’,cursive;}
.notif-btn-no{background:none;border:none;color:rgba(184,76,111,0.5);font-size:12px;cursor:pointer;font-family:‘Comic Sans MS’,cursive;margin-top:-6px;}
#notifBellBtn{position:fixed;bottom:24px;right:20px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#ffd6e6,#ffb6c1);border:2px solid #b67385;box-shadow:0 2px 12px rgba(184,76,111,0.4);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10000;font-size:22px;transition:transform 0.2s;position:fixed;}
#notifBellBtn:hover{transform:scale(1.1);}
.notif-dot{position:absolute;top:4px;right:4px;width:11px;height:11px;border-radius:50%;background:#ff2d78;border:2px solid #fff;display:none;}
.notif-dot.show{display:block;}
</style>

  <svg viewBox="0 0 24 24" fill="none" stroke="#b84c6f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

// ===== TIKTOK VERTICAL SWIPE (translateY — zéro scroll natif) =====
let tkCurrentIndex=0,tkTotalSlides=0;

function tkGoTo(index,animate=true){
  if(index<0||index>=tkTotalSlides)return;
  tkCurrentIndex=index;
  tiktokTrack.style.transition=animate?'transform 0.38s cubic-bezier(0.4,0,0.2,1)':'none';
  tiktokTrack.style.transform=`translateY(${-index*window.innerHeight}px)`;
}

function initTkSwipe(){
  // Supprimer les anciens listeners en recréant le nœud (évite les doublons)
  const newFeed=tiktokFeed.cloneNode(false);
  newFeed.appendChild(tiktokTrack);
  tiktokFeed.parentNode.replaceChild(newFeed,tiktokFeed);
  // Réaffectation locale (la référence globale est devenue stale mais on utilise newFeed)
  const feed=newFeed;

  let startX=0,startY=0,isDragging=false,dragDy=0,lockedDir=null;

  feed.addEventListener('touchstart',e=>{
    if(tkCommentModal.classList.contains('visible'))return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    isDragging=true;dragDy=0;lockedDir=null;
    tiktokTrack.style.transition='none';
  },{passive:true});

  feed.addEventListener('touchmove',e=>{
    if(!isDragging||tkCommentModal.classList.contains('visible'))return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    if(!lockedDir){
      if(Math.abs(dx)>8||Math.abs(dy)>8) lockedDir=Math.abs(dy)>=Math.abs(dx)?'v':'h';
      else return;
    }
    if(lockedDir==='v'){
      e.preventDefault();
      dragDy=dy;
      const base=-tkCurrentIndex*window.innerHeight;
      // Résistance aux bords
      const resistance=(tkCurrentIndex===0&&dy>0)||(tkCurrentIndex===tkTotalSlides-1&&dy<0)?0.2:0.85;
      tiktokTrack.style.transform=`translateY(${base+dragDy*resistance}px)`;
    }
    // Si 'h' → pas d'intervention, le carousel scroll librement
  },{passive:false});

  feed.addEventListener('touchend',()=>{
    if(!isDragging)return;
    isDragging=false;
    if(lockedDir==='v'){
      if(dragDy<-60) tkGoTo(tkCurrentIndex+1);
      else if(dragDy>60) tkGoTo(tkCurrentIndex-1);
      else tkGoTo(tkCurrentIndex);
    }
    lockedDir=null;dragDy=0;
  },{passive:true});
}

function makeDraggable(el,isLegend=false){
  let isDragging=false,startX,startY;

function makePinchZoom(el,isLegend=false){
  el.dataset.scale=el.dataset.scale||1;let initialDistance=null,initialScale=1;
  el.addEventListener('wheel',e=>{e.preventDefault();let scale=parseFloat(el.dataset.scale);scale+=e.deltaY*-0.001;scale=Math.min(Math.max(0.5,scale),3);el.dataset.scale=scale;el.style.transform=`translate(${el.dataset.x||0}px,${el.dataset.y||0}px) scale(${scale})`;savePosition(el.dataset.x,el.dataset.y,isLegend);},{passive:false});

function buildTiktokFeed(list){
  tiktokTrack.innerHTML='';
  const slides=list.filter(c=>(c.zoomGroup&&c.zoomGroup.length)||c.imgUrl);
  tkTotalSlides=slides.length;
  tkCurrentIndex=0;
  tiktokTrack.style.height=`${slides.length*100}vh`;

  slides.forEach(c=>{
    const photos=(c.zoomGroup&&c.zoomGroup.length)?c.zoomGroup:[c.imgUrl];
    const slide=document.createElement('div');slide.className='tiktok-slide';slide.dataset.id=c.id;

    const carousel=document.createElement('div');carousel.className='tiktok-photos';
    photos.forEach(url=>{
      const item=document.createElement('div');item.className='tiktok-photo-item';
      const bg=document.createElement('div');bg.className='photo-bg';bg.style.backgroundImage=`url(${url})`;item.appendChild(bg);
      const img=document.createElement('img');img.src=url;img.alt=c.name||'';img.loading='lazy';img.draggable=false;
      item.appendChild(img);carousel.appendChild(item);
    });
    slide.appendChild(carousel);

    const counter=document.createElement('div');
    counter.className='tiktok-photo-counter'+(photos.length>1?' multi':'');
    counter.textContent=`1 / ${photos.length}`;slide.appendChild(counter);

    if(photos.length>1){
      const dots=document.createElement('div');dots.className='tiktok-dots';
      photos.forEach((_,i)=>{const dot=document.createElement('div');dot.className='tiktok-dot'+(i===0?' active':'');dots.appendChild(dot);});
      slide.appendChild(dots);
      carousel.addEventListener('scroll',()=>{
        const idx2=Math.round(carousel.scrollLeft/carousel.clientWidth);
        dots.querySelectorAll('.tiktok-dot').forEach((d,i)=>d.classList.toggle('active',i===idx2));
        counter.textContent=`${idx2+1} / ${photos.length}`;
      },{passive:true});
    }

    const info=document.createElement('div');info.className='tiktok-info';
    info.innerHTML=`<div class="t-title">${c.name||''}</div><div class="t-legend">${c.legend||''}</div>`;
    slide.appendChild(info);

    const bar=document.createElement('div');bar.className='tiktok-bar';
    const cr0=creations.find(x=>x.id===c.id)||c;
    const alreadyLiked=(cr0.likes||[]).some(l=>l.name===myPrenom);
    const likeBtn2=document.createElement('div');
    likeBtn2.className='tiktok-react-btn'+(alreadyLiked?' liked':'');
    const lS=alreadyLiked?'#ff2d78':'#ffe6f0',lF=alreadyLiked?'#ff2d78':'none';
    likeBtn2.innerHTML=`<svg viewBox="0 0 24 24" fill="${lF}" stroke="${lS}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg><span>${(cr0.likes||[]).length}</span>`;
    likeBtn2.onclick=async(e)=>{
      e.stopPropagation();
      const cr=creations.find(x=>x.id===c.id);if(!cr)return;
      if(!Array.isArray(cr.likes))cr.likes=[];
      const svg2=likeBtn2.querySelector('svg'),span2=likeBtn2.querySelector('span');
      const wasLiked=cr.likes.some(l=>l.name===myPrenom);
      if(wasLiked){cr.likes=cr.likes.filter(l=>l.name!==myPrenom);likeBtn2.classList.remove('liked');svg2.setAttribute('stroke','#ffe6f0');svg2.setAttribute('fill','none');}
      else{cr.likes.push({name:myPrenom,photo:ownerPhoto.src||''});likeBtn2.classList.add('liked');svg2.setAttribute('stroke','#ff2d78');svg2.setAttribute('fill','#ff2d78');spawnHearts(likeBtn2);}
      span2.textContent=cr.likes.length;
      await supabase.from('creations').update({likes:cr.likes}).eq('id',cr.id);
      if(currentZoom&&currentZoom.id===cr.id)currentZoom.likes=[...cr.likes];
    };
    bar.appendChild(likeBtn2);

    const commentBtn2=document.createElement('div');commentBtn2.className='tiktok-react-btn';
    commentBtn2.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="#ffe6f0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>${(cr0.comments||[]).length}</span>`;
    commentBtn2.onclick=(e)=>{e.stopPropagation();const cr=creations.find(x=>x.id===c.id)||c;openTkComments(cr,commentBtn2);};
    bar.appendChild(commentBtn2);
    slide.appendChild(bar);
    tiktokTrack.appendChild(slide);
  });

  tkGoTo(0,false);
}

    if (!subs || !subs.length) return;
    for (const s of subs) {
      await fetch(`${SB_URL_N}/functions/v1/swift-task`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SB_KEY_N },
        body: JSON.stringify({ subscription: { endpoint: s.endpoint, keys: { p256dh: s.p256dh, auth: s.auth } }, title, body, url: url || 'owner.html' })
      }).catch(() => {});
    }
  } catch(e) { console.warn('Push send error:', e); }
};

function updateBellUI(permission) {
  const dot = document.getElementById('notifDot');
  const icon = document.getElementById('notifStatusIcon');
  const text = document.getElementById('notifStatusText');
  const btn  = document.getElementById('notifAllowBtn');
  if (!dot) return;
  if (permission === 'granted') {
    dot.classList.remove('show');
    if (icon) icon.textContent = '✅';
    if (text) text.textContent = 'Les notifications sont activées ! Vous recevrez une alerte pour chaque nouveau message.';
    if (btn)  { btn.textContent = 'Parfait !'; btn.onclick = () => document.getElementById('notifModal').classList.remove('visible'); }
  } else if (permission === 'denied') {
    dot.classList.add('show');
    if (icon) icon.textContent = '🔕';
    if (text) text.textContent = 'Notifications bloquées. Pour les activer : Réglages → Safari → Notifications.';
    if (btn)  { btn.textContent = 'OK compris'; btn.onclick = () => document.getElementById('notifModal').classList.remove('visible'); }
  } else {
    dot.classList.add('show');
  }
}

// Init SW
(async () => {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  let reg;
  try { reg = await navigator.serviceWorker.register('/sw.js'); } catch(e) { return; }

  // Efface badge quand appli au premier plan
  const clearBadge = () => {
    if (navigator.clearAppBadge) navigator.clearAppBadge().catch(()=>{});
    if (reg.active) reg.active.postMessage('CLEAR_BADGE');
  };
  window.addEventListener('focus', clearBadge);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) clearBadge(); });

  updateBellUI(Notification.permission);
  if (Notification.permission === 'granted') await subscribeIfGranted(reg);

  // Bouton cloche → ouvre modal
  document.getElementById('notifBellBtn').onclick = () => {
    document.getElementById('notifModal').classList.add('visible');
  };

  // Fermer modal
  document.getElementById('notifCloseBtn').onclick = () => document.getElementById('notifModal').classList.remove('visible');
  document.getElementById('notifModal').addEventListener('click', e => {
    if (e.target === document.getElementById('notifModal')) document.getElementById('notifModal').classList.remove('visible');
  });

  // Activer notifications
  document.getElementById('notifAllowBtn').onclick = async () => {
    if (Notification.permission === 'granted') { document.getElementById('notifModal').classList.remove('visible'); return; }
    const perm = await Notification.requestPermission();
    updateBellUI(perm);
    if (perm === 'granted') {
      await subscribeIfGranted(reg);
      setTimeout(() => document.getElementById('notifModal').classList.remove('visible'), 1200);
    }
  };
})();
</script>
