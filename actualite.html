<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualité</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Comic Sans MS',cursive; }
html, body { 
  min-height:100%; 
  background: url('2A108385-A26A-4390-A0F8-635DD2C93625.png') center top;
  background-size: cover;
  background-attachment: fixed;
  overflow-y:auto; 
}

/* ====== DEBUG OVERLAY ====== */
#debugBox {
position:fixed;
bottom:0;
left:0;
right:0;
max-height:40vh;
overflow-y:auto;
background:rgba(13,0,8,0.92);
border-top:3px solid #ff2d78;
z-index:99999;
padding:10px;
font-family:monospace;
font-size:12px;
color:#ffe6f0;
display:none;
}
#debugBox.visible { display:block; }
#debugTitle {
color:#ff2d78;
font-weight:bold;
margin-bottom:6px;
display:flex;
justify-content:space-between;
}
#debugClose {
cursor:pointer;
background:#ff2d78;
color:#fff;
border:none;
border-radius:4px;
padding:2px 8px;
font-size:11px;
}
.debug-line { margin:2px 0; line-height:1.4; }
.debug-ok { color:#7fff7f; }
.debug-err { color:#ff6b6b; }
.debug-info { color:#ffe6f0; }

#debugToggle {
position:fixed;
bottom:10px;
right:10px;
z-index:99998;
background:#ff2d78;
color:#fff;
border:none;
border-radius:50%;
width:44px;
height:44px;
font-size:20px;
cursor:pointer;
box-shadow:0 2px 10px rgba(255,45,120,0.5);
}

/* ====== HEADER ====== */
header {
position:sticky; top:0;
background:linear-gradient(135deg,#ffd6e6,#ffb6c1);
height:60px;
display:flex; align-items:center; justify-content:space-between;
padding:0 20px;
font-weight:bold; color:#b84c6f; font-size:22px;
border-bottom:3px solid #b67385;
z-index:100;
box-shadow:0 2px 8px rgba(184,76,111,0.2);
}
.header-left { display:flex; align-items:center; gap:12px; }
.back-btn {
background:#fff; border:2px solid #b67385; border-radius:50%;
width:40px; height:40px;
display:flex; align-items:center; justify-content:center;
cursor:pointer; font-size:20px; transition:all 0.2s;
}
.back-btn:hover { transform:scale(1.1); background:#ffe6f0; }
#ownerPhoto { width:40px; height:40px; border-radius:50%; border:2px solid #fff; object-fit:cover; }

/* ====== NEW POST BOX ====== */
#newPostBox {
margin:20px auto; width:90%; max-width:680px;
background:linear-gradient(135deg,rgba(255,255,255,0.98),rgba(255,245,250,0.95));
border-radius:20px; padding:20px;
box-shadow:0 8px 32px rgba(184,76,111,0.2),0 0 0 1px rgba(182,115,133,0.3);
position:relative; overflow:hidden;
}
#newPostBox::before {
content:’’; position:absolute; top:0; left:0; right:0; height:3px;
background:linear-gradient(90deg,#ff69b4,#ffb6c1,#ffd6e6,#ffb6c1,#ff69b4);
background-size:200% 100%; animation:shimmer 3s linear infinite;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.new-post-header { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.new-post-header img { width:40px; height:40px; border-radius:50%; border:2px solid #ffb6c1; object-fit:cover; }
.new-post-header span { font-weight:bold; color:#b84c6f; }
#newPostBox textarea {
width:100%; border-radius:12px; border:2px solid #b67385;
padding:12px; font-size:15px; resize:none; min-height:80px;
background:#fff; font-family:‘Comic Sans MS’,cursive;
}
#newPostBox textarea:focus { outline:none; border-color:#ff69b4; }
.post-actions-new { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
.photo-upload-btn {
display:flex; align-items:center; gap:8px;
background:#fff; border:2px solid #b67385; border-radius:12px;
padding:8px 16px; cursor:pointer; transition:all 0.2s; color:#b84c6f; font-weight:bold;
}
.photo-upload-btn:hover { background:#ffe6f0; transform:scale(1.05); }
#photoPreview { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
.preview-item { position:relative; width:80px; height:80px; border-radius:8px; overflow:hidden; border:2px solid #b67385; }
.preview-item img { width:100%; height:100%; object-fit:cover; }
.preview-remove {
position:absolute; top:2px; right:2px; background:#ffb6c1; color:#fff;
border-radius:50%; width:20px; height:20px;
display:flex; align-items:center; justify-content:center;
cursor:pointer; font-size:14px; font-weight:bold;
}
#postBtn {
background:linear-gradient(135deg,#ffb6c1,#ff69b4); border:none; color:#fff;
font-weight:bold; border-radius:12px; padding:10px 24px; cursor:pointer;
transition:all 0.2s; font-size:15px; font-family:‘Comic Sans MS’,cursive;
}
#postBtn:hover { transform:scale(1.05); box-shadow:0 4px 12px rgba(255,105,180,0.4); }
#postBtn:disabled { opacity:0.6; cursor:not-allowed; }

/* ====== FEED ====== */
#feed { margin:20px auto; width:90%; max-width:680px; display:flex; flex-direction:column; gap:24px; padding-bottom:80px; }

/* ====== POST ====== */
.post {
background:linear-gradient(135deg,rgba(255,255,255,0.98),rgba(255,240,250,0.95));
border-radius:20px; padding:20px;
box-shadow:0 8px 32px rgba(184,76,111,0.2),0 0 0 1px rgba(182,115,133,0.3);
transition:all 0.3s; overflow:hidden; position:relative;
}
.post::before {
content:’’; position:absolute; top:0; left:0; right:0; height:3px;
background:linear-gradient(90deg,#ff69b4,#ffb6c1,#ffd6e6,#ffb6c1,#ff69b4);
background-size:200% 100%; animation:shimmer 3s linear infinite;
}
.post:hover { transform:translateY(-4px) scale(1.01); box-shadow:0 12px 40px rgba(184,76,111,0.3); }
.post-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.post-author { display:flex; align-items:center; gap:12px; }
.post-author img { width:40px; height:40px; border-radius:50%; border:2px solid #ffb6c1; object-fit:cover; }
.post-author-info { display:flex; flex-direction:column; }
.post-author-name { font-weight:bold; color:#b84c6f; font-size:15px; }
.post-timestamp { font-size:12px; color:#999; }
.post-delete { background:transparent; border:none; color:#999; cursor:pointer; font-size:20px; padding:4px 8px; border-radius:8px; transition:all 0.2s; }
.post-delete:hover { background:#ffe6f0; color:#b84c6f; }
.post-content { font-size:15px; color:#333; line-height:1.5; margin-bottom:12px; word-wrap:break-word; }
.post-photos { display:grid; gap:12px; margin-bottom:16px; border-radius:16px; overflow:hidden; }
.post-photos.single { grid-template-columns:1fr; }
.post-photos.double { grid-template-columns:1fr 1fr; }
.post-photos.triple { grid-template-columns:1fr 1fr; }
.post-photos.triple img:first-child { grid-column:1/-1; max-height:400px; }
.post-photos.multiple { grid-template-columns:1fr 1fr; }
.post-photos img { width:100%; height:auto; object-fit:cover; cursor:pointer; transition:all 0.3s; border-radius:8px; border:2px solid rgba(182,115,133,0.3); max-height:350px; }
.post-photos img:hover { transform:scale(1.02); }
.post-stats { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #ffe6f0; margin-bottom:8px; font-size:13px; color:#666; }
.likes-count, .comments-count { cursor:pointer; transition:color 0.2s; }
.likes-count:hover, .comments-count:hover { color:#b84c6f; text-decoration:underline; }
.post-actions { display:flex; gap:12px; padding:12px 0; border-bottom:1px solid rgba(255,182,193,0.3); }
.post-actions button {
flex:1; background:rgba(255,255,255,0.8); border:2px solid rgba(182,115,133,0.2);
cursor:pointer; color:#666; font-weight:bold;
display:flex; align-items:center; justify-content:center; gap:8px;
font-size:14px; padding:10px; border-radius:12px; transition:all 0.3s;
font-family:‘Comic Sans MS’,cursive;
}
.post-actions button:hover { background:#ffe6f0; border-color:#ff69b4; color:#b84c6f; transform:translateY(-2px); }
.post-actions button.liked { background:rgba(255,105,180,0.2); color:#ff1493; border-color:#ff69b4; }
.comment-section { margin-top:12px; }
.comment-input-area { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.comment-input-area img { width:32px; height:32px; border-radius:50%; border:2px solid #ffb6c1; object-fit:cover; }
.comment-input-area input { flex:1; border-radius:20px; border:1px solid #ddd; padding:8px 16px; font-size:14px; background:#f0f2f5; font-family:‘Comic Sans MS’,cursive; }
.comment-input-area input:focus { outline:none; border-color:#ff69b4; background:#fff; }
.comment-input-area button { background:transparent; border:none; color:#ff69b4; cursor:pointer; font-size:20px; padding:4px 8px; transition:transform 0.2s; }
.comment-input-area button:hover { transform:scale(1.2); }
.comments-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.comment { display:flex; gap:8px; }
.comment img { width:32px; height:32px; border-radius:50%; border:2px solid #ffb6c1; flex-shrink:0; object-fit:cover; }
.comment-content { flex:1; background:rgba(240,242,245,0.95); border-radius:18px; padding:10px 14px; position:relative; }
.comment-author { font-weight:bold; color:#b84c6f; font-size:13px; margin-bottom:2px; }
.comment-text { font-size:14px; color:#333; line-height:1.4; }
.comment-delete { position:absolute; top:4px; right:4px; background:transparent; border:none; color:#999; cursor:pointer; font-size:16px; padding:2px 6px; border-radius:50%; opacity:0; transition:all 0.2s; }
.comment:hover .comment-delete { opacity:1; }
.modal { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; }
.modal-box { background:rgba(255,255,255,0.98); border:2px solid #b67385; border-radius:16px; padding:24px; width:100%; max-width:400px; max-height:80vh; overflow-y:auto; position:relative; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; padding-bottom:12px; border-bottom:2px solid #ffe6f0; }
.modal-header h3 { color:#b84c6f; font-size:18px; }
.closeModal { background:#ffb6c1; color:#fff; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:bold; font-size:20px; border:none; transition:all 0.2s; }
.closeModal:hover { background:#ff69b4; transform:scale(1.1); }
.likes-list { display:flex; flex-direction:column; gap:12px; }
.like-item { display:flex; align-items:center; gap:12px; padding:8px; border-radius:8px; transition:background 0.2s; }
.like-item:hover { background:#ffe6f0; }
.like-item img { width:40px; height:40px; border-radius:50%; border:2px solid #ffb6c1; object-fit:cover; }
.like-item .name { font-weight:bold; color:#b84c6f; font-size:15px; }
#photoViewer { position:fixed; inset:0; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; }
#photoViewer img { max-width:95%; max-height:95%; border-radius:16px; }
#photoViewer .closeModal { position:absolute; top:20px; right:20px; z-index:2001; }
.empty-state { text-align:center; padding:40px 20px; color:#999; }
.empty-state .emoji { font-size:48px; margin-bottom:12px; }
</style>

</head>
<body>

<header>
  <div class="header-left">
    <div class="back-btn" id="backBtn">←</div>
    <span>Actualité</span>
  </div>
  <img id="ownerPhoto" src="icon-152.png" alt="Photo">
</header>

<div id="newPostBox">
  <div class="new-post-header">
    <img id="headerPhoto" src="icon-152.png" alt="Photo">
    <span id="headerName">Quoi de neuf ?</span>
  </div>
  <textarea id="postInput" placeholder="Exprimez-vous..."></textarea>
  <div id="photoPreview"></div>
  <div class="post-actions-new">
    <label class="photo-upload-btn">
      📷 Photo
      <input type="file" id="photoInput" multiple accept="image/*" style="display:none;">
    </label>
    <button id="postBtn">Publier</button>
  </div>
</div>

<div id="feed">
  <div class="empty-state">
    <div class="emoji">🌸</div>
    <p>Chargement...</p>
  </div>
</div>

<div id="likesModal" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>❤️ J'aime</h3>
      <button class="closeModal">×</button>
    </div>
    <div id="likesContent" class="likes-list"></div>
  </div>
</div>

<div id="photoViewer">
  <button class="closeModal">×</button>
  <img id="viewerImage" src="" alt="">
</div>

<!-- DEBUG OVERLAY -->

<button id="debugToggle">🐞</button>

<div id="debugBox">
  <div id="debugTitle">
    <span>🐞 Debug Owner</span>
    <button id="debugClose">Fermer</button>
  </div>
  <div id="debugLines"></div>
</div>

<script src="image-handler.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

// ===== DEBUG =====
const debugBox = document.getElementById('debugBox');
const debugLines = document.getElementById('debugLines');
document.getElementById('debugToggle').onclick = () => debugBox.classList.toggle('visible');
document.getElementById('debugClose').onclick = () => debugBox.classList.remove('visible');

function log(msg, type='info') {
  debugBox.classList.add('visible');
  const line = document.createElement('div');
  line.className = `debug-line debug-${type}`;
  const time = new Date().toLocaleTimeString('fr-FR');
  line.textContent = `[${time}] ${msg}`;
  debugLines.appendChild(line);
  debugLines.scrollTop = debugLines.scrollHeight;
  console.log(msg);
}

// ===== SUPABASE =====
const supabase = createClient(
  "https://kdgxbmqwhpuctjtlygrt.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkZ3hibXF3aHB1Y3RqdGx5Z3J0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjY0NzQsImV4cCI6MjA5MDgwMjQ3NH0.9RsIj_bQgJskg9raRGN6uQJwUUlByTvWAFF2Eq9f6KM"
);

const myPrenom = localStorage.getItem('prenom') || 'Utilisateur';
let ownerPhotoUrl = localStorage.getItem('photo_url') || localStorage.getItem('ownerPhoto') || 'icon-152.png';

log(`Prénom: ${myPrenom}`, 'info');
log(`Photo locale: ${ownerPhotoUrl}`, 'info');

const feed = document.getElementById('feed');
const postBtn = document.getElementById('postBtn');
const postInput = document.getElementById('postInput');
const photoInput = document.getElementById('photoInput');
const photoPreview = document.getElementById('photoPreview');
const likesModal = document.getElementById('likesModal');
const likesContent = document.getElementById('likesContent');
const headerPhoto = document.getElementById('headerPhoto');
const headerName = document.getElementById('headerName');
const ownerPhoto = document.getElementById('ownerPhoto');
const backBtn = document.getElementById('backBtn');
const photoViewer = document.getElementById('photoViewer');
const viewerImage = document.getElementById('viewerImage');

let selectedFiles = [];
let userPhotos = {};

backBtn.onclick = () => { window.location.href = 'owner.html'; };

// ===== PROFIL =====
async function loadMyProfile() {
  log('Chargement profil...', 'info');
  try {
    const { data, error } = await supabase
      .from('profiles')
      .select('photo_url')
      .eq('prenom', myPrenom)
      .single();

    if (error) { log('Profil erreur: ' + JSON.stringify(error), 'err'); }
    else if (data && data.photo_url) {
      ownerPhotoUrl = data.photo_url;
      localStorage.setItem('photo_url', ownerPhotoUrl);
      log('Photo profil OK: ' + ownerPhotoUrl, 'ok');
    } else {
      log('Profil sans photo_url', 'info');
    }
  } catch(e) {
    log('Profil exception: ' + e.message, 'err');
  }
  headerPhoto.src = ownerPhotoUrl;
  ownerPhoto.src = ownerPhotoUrl;
  headerName.textContent = `Quoi de neuf, ${myPrenom} ?`;
}

async function loadUserPhotos() {
  log('Chargement photos users...', 'info');
  try {
    const { data, error } = await supabase.from('profiles').select('prenom, photo_url');
    if (error) { log('UserPhotos erreur: ' + JSON.stringify(error), 'err'); return; }
    (data || []).forEach(u => { if (u.photo_url) userPhotos[u.prenom] = u.photo_url; });
    log(`Photos users: ${Object.keys(userPhotos).length} trouvées`, 'ok');
  } catch(e) {
    log('UserPhotos exception: ' + e.message, 'err');
  }
}

// ===== TIMESTAMP =====
function formatTime(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'À l\'instant';
  if (diff < 3600) return `Il y a ${Math.floor(diff / 60)} min`;
  if (diff < 86400) return `Il y a ${Math.floor(diff / 3600)} h`;
  if (diff < 604800) return `Il y a ${Math.floor(diff / 86400)} j`;
  return date.toLocaleDateString('fr-FR', { day:'numeric', month:'short' });
}

// ===== CHARGER POSTS =====
async function loadPosts() {
  log('Chargement posts...', 'info');
  try {
    const { data, error } = await supabase
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      log('Posts erreur: ' + JSON.stringify(error), 'err');
      feed.innerHTML = `<div class="empty-state"><div class="emoji">❌</div><p>Erreur: ${error.message}</p></div>`;
      return;
    }

    log(`Posts reçus: ${data ? data.length : 0}`, data && data.length > 0 ? 'ok' : 'info');

    if (data && data.length > 0) {
      log(`1er post: name=${data[0].name}, content=${data[0].content}, photos=${JSON.stringify(data[0].photos)}`, 'info');
      log(`likes type: ${typeof data[0].likes}, val: ${JSON.stringify(data[0].likes)}`, 'info');
    }

    feed.innerHTML = '';

    if (!data || data.length === 0) {
      feed.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🌸</div>
          <p>Aucune publication pour le moment</p>
          <p style="font-size:13px;margin-top:8px;">Soyez le premier à partager quelque chose !</p>
        </div>`;
      return;
    }

    data.forEach(post => {
      // Sécuriser les champs — la table a: name, content, photo, photos(jsonb), likes(jsonb), comments(jsonb)
      const likes = Array.isArray(post.likes) ? post.likes : [];
      const comments = Array.isArray(post.comments) ? post.comments : [];
      const photos = Array.isArray(post.photos) ? post.photos : [];
      const isLiked = likes.some(l => l.name === myPrenom);
      const authorPhoto = userPhotos[post.name] || post.photo || 'icon-152.png';

      let photoGridClass = '';
      if (photos.length === 1) photoGridClass = 'single';
      else if (photos.length === 2) photoGridClass = 'double';
      else if (photos.length === 3) photoGridClass = 'triple';
      else if (photos.length > 3) photoGridClass = 'multiple';

      const div = document.createElement('div');
      div.className = 'post';
      div.innerHTML = `
        <div class="post-header">
          <div class="post-author">
            <img src="${authorPhoto}" alt="${post.name||''}" onerror="this.src='icon-152.png'">
            <div class="post-author-info">
              <div class="post-author-name">${post.name || 'Anonyme'}</div>
              <div class="post-timestamp">${formatTime(post.created_at)}</div>
            </div>
          </div>
          ${post.name === myPrenom ? '<button class="post-delete" title="Supprimer">🗑️</button>' : ''}
        </div>
        ${post.content ? `<div class="post-content">${post.content}</div>` : ''}
        ${photos.length > 0 ? `
          <div class="post-photos ${photoGridClass}">
            ${photos.map(p => `<img src="${p}" alt="Photo" onerror="this.style.display='none'">`).join('')}
          </div>` : ''}
        ${likes.length > 0 || comments.length > 0 ? `
          <div class="post-stats">
            <div class="likes-count">${likes.length > 0 ? `❤️ ${likes.length}` : ''}</div>
            <div class="comments-count">${comments.length > 0 ? `${comments.length} commentaire${comments.length > 1 ? 's' : ''}` : ''}</div>
          </div>` : ''}
        <div class="post-actions">
          <button class="likeBtn ${isLiked ? 'liked' : ''}">${isLiked ? '❤️' : '🤍'} J'aime</button>
          <button class="toggleCommentBtn">💬 Commenter</button>
        </div>
        <div class="comment-section" style="display:${comments.length > 0 ? 'block' : 'none'}">
          <div class="comments-list"></div>
          <div class="comment-input-area">
            <img src="${ownerPhotoUrl}" alt="${myPrenom}" onerror="this.src='icon-152.png'">
            <input type="text" placeholder="Écrivez un commentaire..." class="commentInput">
            <button class="sendCommentBtn">➤</button>
          </div>
        </div>`;

      // DELETE
      const deleteBtn = div.querySelector('.post-delete');
      if (deleteBtn) {
        deleteBtn.onclick = async () => {
          if (confirm('Supprimer cette publication ?')) {
            const { error } = await supabase.from('posts').delete().eq('id', post.id);
            if (!error) { log('Post supprimé', 'ok'); loadPosts(); }
            else log('Delete erreur: ' + JSON.stringify(error), 'err');
          }
        };
      }

      // PHOTOS
      div.querySelectorAll('.post-photos img').forEach(img => {
        img.onclick = () => { viewerImage.src = img.src; photoViewer.style.display = 'flex'; };
      });

      // LIKE
      div.querySelector('.likeBtn').onclick = async () => {
        let newLikes = [...likes];
        const idx = newLikes.findIndex(l => l.name === myPrenom);
        if (idx !== -1) newLikes.splice(idx, 1);
        else newLikes.push({ name: myPrenom, photo: ownerPhotoUrl });
        log(`Like update: ${newLikes.length} likes`, 'info');
        const { error } = await supabase.from('posts').update({ likes: newLikes }).eq('id', post.id);
        if (error) log('Like erreur: ' + JSON.stringify(error), 'err');
        else { log('Like OK', 'ok'); loadPosts(); }
      };

      // STATS LIKES CLICK
      const likesCountEl = div.querySelector('.likes-count');
      if (likesCountEl) {
        likesCountEl.onclick = () => {
          if (!likes.length) return;
          likesContent.innerHTML = '';
          likes.forEach(like => {
            const item = document.createElement('div');
            item.className = 'like-item';
            const likePhoto = userPhotos[like.name] || like.photo || 'icon-152.png';
            item.innerHTML = `<img src="${likePhoto}" alt="${like.name}" onerror="this.src='icon-152.png'"><span class="name">${like.name}</span>`;
            likesContent.appendChild(item);
          });
          likesModal.style.display = 'flex';
        };
      }

      // TOGGLE COMMENTS
      const commentSection = div.querySelector('.comment-section');
      div.querySelector('.toggleCommentBtn').onclick = () => {
        commentSection.style.display = commentSection.style.display === 'none' ? 'block' : 'none';
        if (commentSection.style.display === 'block') commentSection.querySelector('.commentInput').focus();
      };

      // SEND COMMENT
      const commentInput = div.querySelector('.commentInput');
      const addComment = async () => {
        const text = commentInput.value.trim();
        if (!text) return;
        const newComments = [...comments, { name: myPrenom, photo: ownerPhotoUrl, text, timestamp: new Date().toISOString() }];
        const { error } = await supabase.from('posts').update({ comments: newComments }).eq('id', post.id);
        if (error) log('Comment erreur: ' + JSON.stringify(error), 'err');
        else { log('Comment OK', 'ok'); commentInput.value = ''; loadPosts(); }
      };
      div.querySelector('.sendCommentBtn').onclick = addComment;
      commentInput.onkeypress = e => { if (e.key === 'Enter') addComment(); };

      // DISPLAY COMMENTS
      const commentsList = div.querySelector('.comments-list');
      comments.forEach((comment, index) => {
        const cm = document.createElement('div');
        cm.className = 'comment';
        const commentPhoto = userPhotos[comment.name] || comment.photo || 'icon-152.png';
        cm.innerHTML = `
          <img src="${commentPhoto}" alt="${comment.name}" onerror="this.src='icon-152.png'">
          <div class="comment-content">
            <div class="comment-author">${comment.name}</div>
            <div class="comment-text">${comment.text}</div>
            ${comment.name === myPrenom ? `<button class="comment-delete">×</button>` : ''}
          </div>`;
        const delCm = cm.querySelector('.comment-delete');
        if (delCm) {
          delCm.onclick = async () => {
            const newComments = comments.filter((_, i) => i !== index);
            const { error } = await supabase.from('posts').update({ comments: newComments }).eq('id', post.id);
            if (!error) loadPosts();
          };
        }
        commentsList.appendChild(cm);
      });

      feed.appendChild(div);
    });

    log('Rendu terminé ✅', 'ok');
  } catch(e) {
    log('Exception loadPosts: ' + e.message, 'err');
    feed.innerHTML = `<div class="empty-state"><div class="emoji">❌</div><p>Erreur inattendue: ${e.message}</p></div>`;
  }
}

// ===== UPLOAD & NOUVEAU POST =====
photoInput.onchange = () => {
  selectedFiles = Array.from(photoInput.files);
  renderPhotoPreview();
};

function renderPhotoPreview() {
  photoPreview.innerHTML = '';
  selectedFiles.forEach((file, index) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    const remove = document.createElement('div');
    remove.className = 'preview-remove';
    remove.textContent = '×';
    remove.onclick = () => { selectedFiles.splice(index, 1); renderPhotoPreview(); };
    div.appendChild(img); div.appendChild(remove);
    photoPreview.appendChild(div);
  });
}

postBtn.onclick = async () => {
  const content = postInput.value.trim();
  if (!content && selectedFiles.length === 0) { alert('Écrivez quelque chose ou ajoutez une photo !'); return; }
  postBtn.disabled = true;
  postBtn.textContent = 'Publication...';
  try {
    let photoUrls = [];
    if (selectedFiles.length > 0) {
      log(`Upload ${selectedFiles.length} image(s)...`, 'info');
      if (typeof uploadMultipleImages === 'function') {
        photoUrls = await uploadMultipleImages(selectedFiles, (current, total) => {
          postBtn.textContent = `Upload ${current}/${total}...`;
          log(`Upload ${current}/${total}`, 'info');
        });
        log(`Images uploadées: ${photoUrls.length}`, 'ok');
      } else {
        log('uploadMultipleImages introuvable ! Vérifier image-handler.js', 'err');
      }
    }

    const newPost = {
      name: myPrenom,
      content: content,
      photo: ownerPhotoUrl,
      photos: photoUrls,
      likes: [],
      comments: []
    };
    log('Insert post: ' + JSON.stringify(newPost).substring(0, 100), 'info');

    const { data, error } = await supabase.from('posts').insert([newPost]).select();
    if (error) {
      log('Insert erreur: ' + JSON.stringify(error), 'err');
      alert('Erreur: ' + error.message);
    } else {
      log('Post créé: ' + JSON.stringify(data), 'ok');
      postInput.value = '';
      selectedFiles = [];
      photoPreview.innerHTML = '';
      photoInput.value = '';
      await loadPosts();
    }
  } catch(e) {
    log('Exception post: ' + e.message, 'err');
    alert('Erreur: ' + e.message);
  } finally {
    postBtn.disabled = false;
    postBtn.textContent = 'Publier';
  }
};

postInput.onkeypress = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); postBtn.click(); } };

// MODALS
document.querySelectorAll('.closeModal').forEach(btn => {
  btn.onclick = () => { likesModal.style.display = 'none'; photoViewer.style.display = 'none'; };
});
likesModal.onclick = e => { if (e.target === likesModal) likesModal.style.display = 'none'; };
photoViewer.onclick = e => { if (e.target === photoViewer) photoViewer.style.display = 'none'; };

// ===== INIT =====
(async () => {
  log('=== DÉMARRAGE ===', 'info');
  await loadMyProfile();
  await loadUserPhotos();
  await loadPosts();
  log('=== INIT TERMINÉ ===', 'ok');
})();

setInterval(() => loadPosts(), 30000);
</script>
